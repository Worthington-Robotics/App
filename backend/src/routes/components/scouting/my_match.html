<div class="cont round match {{class}}" data-num="{{number}}">
	<div class="match-inner">
		<div class="cont match-number">{{number}}</div>
		<div class="cont match-time">{{time}}</div>
		<div class="cont match-team"></div>
		<div class="cont">
			<div class="match-claims">{{claims}}</div>
		</div>
		<div class="done-icon">{{done-icon}}</div>
	</div>
</div>
