<div class="container round event">
	<div class="container event-header">
		<div class="event-date">{{date}}</div>
		<div class="event-name">{{name}}</div>
	</div>
	<div class="container event-subtext">
		<div class="event-kind">{{kind}}</div>
		<div class="dot"></div>
		<div class="event-invites">{{invites}} invited</div>
		<div class="dot"></div>
		<div class="event-going">{{going}} going</div>
	</div>
</div>
