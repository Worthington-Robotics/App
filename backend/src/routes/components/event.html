<div class="cont round event">
	<div class="cont event-header">
		<div class="event-date">{{date}}</div>
		<div class="event-name">{{name}}</div>
	</div>
	<div class="cont event-subtext">
		<div class="event-kind">{{kind}}</div>
		<div class="dot"></div>
		<div class="event-invites">{{invites}} invited</div>
		<div class="dot"></div>
		<div class="event-going">{{going}} going</div>
		<div class="event-edit">
			<a href="/create_event?id={{id}}">{{edit}}</a>
		</div>
	</div>
</div>
