<svg class="progress-ring" width="{{size}}" height="{{size}}" style="transform: rotate(90deg)">
	<circle class="progress-ring__circle" stroke="var(--wbblueacc)" stroke-width="3" fill="transparent" r="{{radius}}"
		cx="{{midpoint}}" cy="{{midpoint}}" style="
	stroke-dasharray: __circumference__ __circumference__;
	stroke-dashoffset: __dash-offset__;
	" />
</svg>
