{{worbots-header}}
<h1>To Do</h1>
<div id="checklists" class="cont col">
	<div id="checklists-cont" class="cont col item-cont">{{checklists}}</div>
	{{add-checklist}}
</div>
<style>
	#checklists {
		width: 100%;
		row-gap: 1.4rem;
	}

	.cl {
		display: grid;
		grid-template-columns: minmax(0, 0.5fr) minmax(0, 4fr) minmax(0, 1fr) minmax(0, 1fr);
	}

	.cl-subtext {
		font-size: calc(1.2vw * var(--scale));
		color: var(--fg3);
	}

	.cl-name {
		font-weight: bold;
	}

	.cl-check {
		width: 1rem;
		margin-right: -0.1rem;
	}
</style>
{{footer}}
