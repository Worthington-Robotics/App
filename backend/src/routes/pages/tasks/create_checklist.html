{{worbots-header}}{{error}}
<h2>Create/Edit Checklist</h2>
<form id="cl-form" class="cont col">
	<input
		type="text"
		name="name"
		id="name-field"
		class="create-cl-field"
		placeholder="Enter checklist name..."
		value="{{name}}"
	/>

	<input type="submit" id="submit" value="Save" />
</form>
<script>
	function onSubmit(event) {
		event.preventDefault();
		const id = "{{id}}";
		const name = document.getElementById("name-field").value;

		let nameEncoded = encodeURIComponent(name);

		fetch("/api/create_checklist", {
			method: "POST",
			body: `id=${id}&name=${nameEncoded}`,
			headers: { "Content-Type": "application/x-www-form-urlencoded" },
		}).then((response) => {
			if (response.status != 200) {
				setError("Failed to create checklist: " + response.statusText);
				return;
			}
			window.location.href = "/checklists";
		});
	}

	document.getElementById("cl-form").addEventListener("submit", onSubmit);
</script>
<style>
	.create-cl-field {
		width: 40%;
	}
</style>
{{footer}}
