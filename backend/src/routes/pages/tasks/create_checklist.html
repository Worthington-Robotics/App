{{worbots-header}}{{error}}
<h2>Create/Edit Checklist</h2>
<form id="cl-form" class="cont col">
	<button onclick="history.back()">Back</button>
	<input type="text" name="name" id="name-field" class="create-cl-field" placeholder="Enter checklist name..."
		value={{name}} />
	<label for="template">Template</label>
	<select id="template" name="template">
		<option value="none" selected>Empty</option>
		{{template-options}}
	</select>

	<input type="submit" id="submit" value="Save" />
</form>
<script>
	function onSubmit(event) {
		event.preventDefault();
		const id = "{{id}}";
		const name = document.getElementById("name-field").value;

		let nameEncoded = encodeURIComponent(name);

		let template = document.getElementById("template").value;
		let templateString = template == "none" ? "" : `&template=${template}`;

		fetch("/api/create_checklist", {
			method: "POST",
			body: `id=${id}&name=${nameEncoded}${templateString}`,
			headers: { "Content-Type": "application/x-www-form-urlencoded" },
		}).then((response) => {
			if (response.status != 200) {
				setError("Failed to create checklist: " + response.statusText);
				return;
			}
			window.location.href = "/checklists";
		});
	}

	document.getElementById("cl-form").addEventListener("submit", onSubmit);
</script>
<style>
	.create-cl-field {
		width: 40%;
	}
</style>
{{footer}}
