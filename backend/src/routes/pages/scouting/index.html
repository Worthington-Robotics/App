{{worbots-header}}
<h1>Scouting</h1>
<div class="cont">
	<div class="card-cont">
		<a href="/scouting/teams?competition=Current" class="cont col round nolink scouting-card">
			<img class="card-img"
				src="https://www.firstinspires.org/sites/default/files/styles/square_thumbnail/public/image_gallery/FRC24-2024-04-19-BAM-0514-WEB.jpg?itok=eeOVqx7K" />
			<div class="card-title">Teams</div>
		</a>
		<a href="/scouting/report/raw" class="cont col round nolink scouting-card">
			<img class="card-img"
				src="https://www.firstinspires.org/sites/default/files/styles/square_thumbnail/public/image_gallery/FRC24-2024-04-19-BAM-0350-WEB.jpg?itok=AQgJ1VWn" />
			<div class="card-title">Raw Report</div>
		</a>
	</div>
</div>
<style>
	.card-cont {
		display: grid;
		grid-template-columns: repeat(2, minmax(0, 1fr));
		width: 24rem;
	}

	.scouting-card {
		background-color: var(--bg2);
		padding-bottom: 1.2rem;
		margin: 0.4rem;
	}

	.card-img {
		width: 100%;
		opacity: 70%;
	}
</style>
{{footer}}
