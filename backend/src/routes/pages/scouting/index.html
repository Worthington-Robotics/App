{{worbots-header}}
<h1>Scouting</h1>
<div class="cont">
	<div class="card-cont">
		<a href="/scouting/teams?competition=Current" class="cont col round nolink scouting-card">
			<img class="round card-img" src="https://www.firstinspires.org/hs-fs/hubfs/20250418ben00217_1.webp?width=630&height=420&name=20250418ben00217_1.webp" />
			<div class="card-title">Teams</div>
		</a>
		<a href="/scouting/my" class="cont col round nolink scouting-card">
			<img class="round card-img"
				src="https://www.firstinspires.org/hs-fs/hubfs/_20250416ben00395_1.webp?width=4096&height=2730&name=_20250416ben00395_1.webp" />
			<div class="card-title">My Scouting</div>
		</a>
		<a href="/scouting/matchup" class="cont col round nolink scouting-card">
			<img class="round card-img"
				src="https://www.firstinspires.org/hubfs/purpose_1.webp" />
			<div class="card-title">Matchup</div>
		</a>
		<a href="/scouting/schedule" class="cont col round nolink scouting-card">
			<img class="round card-img" src="https://i.ibb.co/mCPYn59/Match-Schedule.jpg" />
			<div class="card-title">Match Schedule</div>
		</a>
		<a href="/scouting/admin" class="cont col round nolink scouting-card" style="display:{{admin-display}}">
			<img class="round card-img"
				src="https://www.firstinspires.org/hs-fs/hubfs/web/about/careers-hero-1260x840.webp?width=630&height=420&name=careers-hero-1260x840.webp" />
			<div class="card-title">Administration</div>
		</a>
	</div>
</div>
<style>
	.card-cont {
		display: grid;
		grid-template-columns: repeat(2, minmax(0, 1fr));
		width: 24rem;
	}

	.scouting-card {
		background-color: var(--bg2);
		padding-bottom: 1.2rem;
		margin: 0.4rem;
	}

	.card-img {
		width: 100%;
		height: 10rem;
		object-fit: cover;
		opacity: .9;
	}
</style>
{{footer}}
