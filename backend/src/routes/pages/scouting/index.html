{{worbots-header}}
<h1>Scouting</h1>
<div class="cont">
	<div class="card-cont">
		<a href="/scouting/teams?competition=Current" class="cont col round nolink scouting-card">
			<img class="round card-img"
				src="https://www.firstinspires.org/sites/default/files/styles/square_thumbnail/public/image_gallery/FRC24-2024-04-19-BAM-0514-WEB.jpg?itok=eeOVqx7K" />
			<div class="card-title">Teams</div>
		</a>
		<a href="/scouting/report" class="cont col round nolink scouting-card">
			<img class="round card-img"
				src="https://www.firstinspires.org/sites/default/files/styles/square_thumbnail/public/image_gallery/1A9_278_22494_442526358_6.jpg?itok=D_r0nzVc" />
			<div class="card-title">Match Report</div>
		</a>
		<a href="/scouting/matchup" class="cont col round nolink scouting-card">
			<img class="round card-img"
				src="https://www.firstinspires.org/sites/default/files/styles/square_thumbnail/public/image_gallery/FRC24-2024-04-18-BAM-0614-WEB.jpg?itok=vfbFmigE" />
			<div class="card-title">Matchup</div>
		</a>
		<a href="/scouting/schedule" class="cont col round nolink scouting-card">
			<img class="round card-img" src="https://i.ibb.co/mCPYn59/Match-Schedule.jpg" />
			<div class="card-title">Match Schedule</div>
		</a>
		<a href="/scouting/report/raw" class="cont col round nolink scouting-card">
			<img class="round card-img"
				src="https://www.firstinspires.org/sites/default/files/styles/square_thumbnail/public/image_gallery/FRC24-2024-04-19-BAM-0350-WEB.jpg?itok=AQgJ1VWn" />
			<div class="card-title">Raw Report</div>
		</a>
		<a href="/scouting/admin" class="cont col round nolink scouting-card" style="display:{{admin-display}}">
			<img class="round card-img"
				src="https://www.firstinspires.org/sites/default/files/styles/square_thumbnail/public/image_gallery/FRC24-2024-04-18-BAM-0583-WEB.jpg?itok=eRFB9xzh" />
			<div class="card-title">Administration</div>
		</a>
	</div>
</div>
<style>
	.card-cont {
		display: grid;
		grid-template-columns: repeat(2, minmax(0, 1fr));
		width: 24rem;
	}

	.scouting-card {
		background-color: var(--bg2);
		padding-bottom: 1.2rem;
		margin: 0.4rem;
	}

	.card-img {
		width: 100%;
		opacity: .8;
	}
</style>
{{footer}}
