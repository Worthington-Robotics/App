{{worbots-header}}{{error}}{{prompt}}
<h1>Match Schedule</h1>
<div id="schedule" class="cont col">
	<div id="filter" class="cont">
		<button id="our-matches">Our Matches</button>
		<button id="all-matches" style="background-color: var(--bg2);">All Matches</button>
	</div>
	<div class="cont col item-container" id="matches">
		{{matches}}
	</div>
	<br />
	<div id="admin-controls" style={{admin-control-style}}>
		<button id="import-button">Import Matches</button>
		<button id="clear-button" style="background-color: var(--wbred);">Clear Matches</button>
		<button id="upload-button">Upload Matches</button>
	</div>
	<div id="upload-popup-container" class="cont" style="display:none">
		<div id="upload-popup" class="cont col round">
			<h3>Upload Matches</h3>
			<p id="upload-explanation">
				Make sure to check documentation for the correct file format
			</p>
			<form class="cont col" id="upload-form">
				<input type="file" id="upload-file" />
				<div class="cont">
					<input type="submit" value="Upload">
					<button id="upload-popup-close">Close</button>
				</div>
			</form>
		</div>
	</div>
</div>
<style>
	#matches {
		row-gap: 0.6rem;
	}

	.next {
		border: 0.2rem solid var(--wbblueacc);
	}

	.match {
		width: 23.5rem;
		padding: 0.72rem;
	}

	.match-inner {
		display: grid;
		grid-template-columns: minmax(0, 0.2fr) minmax(0, 0.2fr) minmax(0, .5fr) minmax(0, 0.2fr);
		width: 100%;
	}

	.match-number {
		font-size: calc(1.7vw * var(--scale));
		margin-right: 0.8rem;
	}

	.match-time {
		color: var(--fg2);
		text-align: center;
		margin-right: 0.4rem;
	}

	.match-section {
		box-sizing: border-box;
	}

	.alliances {
		row-gap: 0.3rem;
	}

	.alliance {
		gap: 0.3rem;
	}

	.red-team,
	.blue-team {
		font-size: calc(1.2vw * var(--scale));
		padding: 0.3rem;
		width: 2rem;
		font-weight: bold;
		cursor: pointer;
	}

	.red-team {
		color: var(--wbred);
	}

	.red-team.us {
		background-color: var(--wbred);
	}

	.blue-team {
		color: var(--wbblueacc);
	}

	.blue-team.us {
		background-color: var(--wbblueacc);
	}

	.us {
		font-weight: normal;
		color: black;
	}

	.view-button {
		background-color: var(--wbblue);
		padding: 0.4rem;
		width: 1.2rem;
		height: 1.2rem;
	}

	.day-break {
		margin: 0.5rem 0px;
		border-bottom: 0.25rem solid var(--bg4);
		width: 50%;
		padding-bottom: 0.4rem;
		color: var(--fg3);
		font-weight: bold;
	}

	/* Start with these hidden */
	.not-ours {
		display: none;
	}

	#admin-controls {
		display: grid;
		grid-template-columns: repeat(2, minmax(0, 1fr));
		width: 90%;
		gap: 1rem;
	}

	#upload-popup-container {
		position: fixed;
		left: 0;
		top: 0;
		width: 100vw;
		height: 100vh;
		z-index: 100;
		background-color: rgba(0, 0, 0, 0.5);
	}

	#upload-popup {
		background-color: var(--bg2);
		padding: 1.5rem;
		width: 80%;
	}
</style>
<script>
	// Filter logic
	let ourMatches = document.getElementById("our-matches");
	let allMatches = document.getElementById("all-matches");
	let notOurs = document.getElementsByClassName("not-ours");
	ourMatches.addEventListener("click", () => {
		ourMatches.style.backgroundColor = "";
		allMatches.style.backgroundColor = "var(--bg2)";
		for (let e of notOurs) {
			e.style.display = "none";
		}
	});
	allMatches.addEventListener("click", () => {
		allMatches.style.backgroundColor = "";
		ourMatches.style.backgroundColor = "var(--bg2)";
		for (let e of notOurs) {
			e.style.display = "flex";
		}
	});

	document.getElementById("import-button").addEventListener("click", () => {
		showConfirmPrompt("import matches, deleting all existing ones", () => {
			fetch("/api/import_match_schedule", {
				method: "POST",
			}).then((resp) => {
				if (resp.status == 200) {
					window.location.reload();
				} else {
					setError(resp.statusText);
				}
			});
		});
	});

	document.getElementById("clear-button").addEventListener("click", () => {
		showConfirmPrompt("delete all matches", () => {
			fetch("/api/clear_match_schedule", {
				method: "POST",
			}).then((resp) => {
				if (resp.status == 200) {
					window.location.reload();
				} else {
					setError(resp.statusText);
				}
			});
		});
	});

	// Match upload logic
	let uploadPopupContainer = document.getElementById("upload-popup-container");

	document.getElementById("upload-popup-close").addEventListener("click", (e) => {
		e.preventDefault();
		uploadPopupContainer.style.display = "none";
	});

	document.getElementById("upload-button").addEventListener("click", () => {
		uploadPopupContainer.style.display = "";
	});

	document.getElementById("upload-form").addEventListener("submit", (e) => {
		e.preventDefault();

		let file = document.getElementById("upload-file").files[0];
		if (file == undefined) {
			setError("Please select a file");
			return;
		}

		let reader = new FileReader();
		reader.readAsText(file, "UTF-8");
		reader.onload = (e) => {
			let contents = e.target.result;
			if (contents == null) {
				return;
			}
			console.log(contents);
			// Split by lines, removing carriage returns.
			// Don't include the first line, as it is just the headers of the TSV
			let lines = contents.split(/\r?\n/).slice(1);

			if (lines.length == 0) {
				setError("No matches were found from file");
				return;
			}

			let matches = [];
			for (let line of lines) {
				let cols = line.split(/\t/);
				console.log(cols);
				if (cols.length < 8) {
					setError("Incorrect number of columns in match");
					return;
				}

				// Dates should look like "Sat, 6 Apr 2024 10:33:00". We add in the offset
				let date = cols[1] + " -0400";
				let match = {
					num: {
						ty: "Qualification",
						num: cols[0] * 1
					},
					date: date,
					"red_alliance": [
						cols[2] * 1,
						cols[3] * 1,
						cols[4] * 1
					],
					"blue_alliance": [
						cols[5] * 1,
						cols[6] * 1,
						cols[7] * 1
					]
				};
				matches.push(match);
			}

			let matchesJson = JSON.stringify(matches);

			fetch("/api/upload_match_schedule", {
				method: "POST",
				body: matchesJson,
				headers: { "Content-Type": "application/json" },
			}).then((resp) => {
				if (resp.status == 200) {
					uploadPopupContainer.style.display = "none";
					window.location.reload();
				} else {
					setError(resp.statusText);
				}
			});
		};
		reader.onerror = (e) => {
			setError("Failed to read uploaded file");
		};
	});
</script>
{{footer}}
