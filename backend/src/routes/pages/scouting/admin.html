{{worbots-header}}{{error}}{{prompt}}
<h1>Scouting Administration</h1>
<div class="cont col">
	<button onclick="history.back()">Back</button>
	<br />
	<!-- <form class="cont col round" method="post" enctype="multipart/form-data" id="upload-form">
		<label for="file">Upload scouting data</label>
		<input name="file" type="file" accept=".json" />
		<input type="submit" value="Submit" />
	</form> -->
	<div class="cont col">
		<h2>Download Scouting Data</h2>
		<button id="download-team-stats">Team Stats</button>
		<button id="download-team-stats-current-comp">Team Stats (Current Competition)</button>
		<button id="download-matches">Matches</button>
		<button id="download-team-info">Pit Scouting</button>
		<iframe id="download-iframe" style="display:none;"></iframe>
	</div>
	<div class="cont col">
		<h2>Other</h2>
		<a href="/scouting/assignments"><button>Edit Prescouting Assignments</button></a>
		<button id="pit-scouting-reset">Mark Pit Scouting as Needing Update</button>
		<a href="/scouting/review"><button>View All Scouting Reports</button></a>
	</div>
	<div class="cont col">
		<h2>Settings</h2>
		<div class="cont">
			<div class="cont col">
				<label for="competition">Current Competition</label>
				<select id="competition" name="competition">
					{{competition-options}}
				</select>
			</div>
			<div class="cont col">
				<label for="division">Current Division</label>
				<select id="division" name="division">
					{{division-options}}
				</select>
			</div>
		</div>
		<div class="cont col">
			<label for="focused-teams">Focused Teams for Match Scouting</label>
			<textarea id="focused-teams" name="focused-teams" placeholder="4145, 27">{{focused-teams}}</textarea>
		</div>
		<input type="submit" id="settings-submit" value="Save" />
	</div>
</div>
<style>
	#upload-form {
		background-color: var(--bg2);
		padding: 1.5rem;
	}
</style>
<script>
	document.getElementById("download-team-stats").addEventListener("click", () => {
		document.getElementById("download-iframe").src = "/api/scouting_download/team_stats.csv";
	});
	document.getElementById("download-team-stats-current-comp").addEventListener("click", () => {
		document.getElementById("download-iframe").src = "/api/scouting_download/team_stats_current_competition.csv";
	});
	document.getElementById("download-matches").addEventListener("click", () => {
		document.getElementById("download-iframe").src = "/api/scouting_download/matches.csv";
	});
	document.getElementById("download-team-info").addEventListener("click", () => {
		document.getElementById("download-iframe").src = "/api/scouting_download/team_info.csv";
	});
	document.getElementById("pit-scouting-reset").addEventListener("click", () => {
		showConfirmPrompt("refresh pit scouting", () => {
			fetch("/api/scouting/reset_team_info", {
				method: "POST",
			}).then((resp) => {
				if (resp.status != 200) {
					setError(resp.statusText);
				} else {
					setSuccess("Pit scouting refreshed");
				}
			});
		});
	})

	document.getElementById("settings-submit").addEventListener("click", (e) => {
		e.preventDefault();

		let competition = document.getElementById("competition").value;
		let division = document.getElementById("division").value;
		let focusedTeams = document.getElementById("focused-teams").value;

		fetch("/api/scouting/update_settings", {
			method: "POST",
			body: `competition=${competition}&division=${division}&focused_teams=${focusedTeams}`,
			headers: { "Content-Type": "application/x-www-form-urlencoded" },
		}).then((resp) => {
			if (resp.status != 200) {
				setError(resp.statusText);
			} else {
				setSuccess("Settings updated");
			}
		});
	})
</script>
{{footer}}
