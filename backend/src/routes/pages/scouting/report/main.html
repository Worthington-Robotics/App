{{worbots-header}}{{error}}
<h1>Match Report</h1>
<div class="cont">
	<button onclick="history.back()">Back</button>
</div>
<br />
<div id="time-container">
	<div class="cont">
		<div id="match-time" class="cont round">
			<div id="match-time-value">0:00.0</div>
			<button id="time-edit-button">Edit</button>
			<button id="time-pause-button">Start</button>
			<select id="time-speed">
				<option value="1" selected>1x</option>
				<option value="0.5">0.5x</option>
				<option value="0.25">0.25x</option>
			</select>
		</div>
	</div>
</div>
<div id="time-edit-popup-container" class="cont" style="display:none">
	<div id="time-edit-popup" class="cont col round">
		<h3>Edit Time</h3>
		<form id="time-edit-form" class="cont col">
			<label for="time-value">Time Value</label>
			<input type="text" id="time-edit-field" name="time-value" />
			<label for="time-offset">Time Offset</label>
			<input type="text" id="time-offset" name="time-offset" />
			<div class="cont">
				<button id="time-edit-cancel" style="background-color: var(--bg3)">Cancel</button>
				<input type="submit" value="Save" />
			</div>
		</form>
	</div>
</div>
<br />
<div id="match-report" class="cont col">
	<h2>Pre-Match</h2>
	<label for="team-number">Team Number</label>
	<input type="number" class="field" name="team-number" id="team-number" placeholder="0000" value="{team-number}" />
	<label for="match-number">Match Number</label>
	<input type="text" class="field" name="match-number" id="match-number" placeholder="Q0" value="{match-number}" />
	<label for="competition">Competition</label>
	<select id="competition" name="competition">
		{{competition-options}}
	</select>
	<div class="cont">
		<input type="checkbox" name="recorded-live" id="recorded-live" class="field" />
		<label for="recorded-live">Recording Live?</label>
	</div>
	<div class="cont">
		<input type="checkbox" name="showed-up" id="showed-up" class="field" />
		<label for="showed-up">Showed Up?</label>
	</div>
	<h2>Auto</h2>
	<div class="section-grid">
		<button id="auto-coral-l4" class="grid-button auto-nonconfirm reef"><img src="/assets/icons/coral.svg"
				class="grid-icon coral" /></button>
		<button id="auto-algae" class="grid-button auto-nonconfirm"><img src="/assets/icons/algae.svg"
				class="grid-icon algae" /></button>
		<button id="auto-coral-l3" class="grid-button auto-nonconfirm reef"><img src="/assets/icons/coral.svg"
				class="grid-icon coral" /></button>
		<button id="auto-algae-miss" class="grid-button auto-nonconfirm miss"><img src="/assets/icons/algae.svg"
				class="grid-icon algae" /></button>
		<button id="auto-coral-l2" class="grid-button auto-nonconfirm reef"><img src="/assets/icons/coral.svg"
				class="grid-icon coral" /></button>
		<button id="auto-intake" class="grid-button auto-nonconfirm"><img src="/assets/icons/download.svg"
				class="grid-icon" /></button>
		<button id="auto-coral-l1" class="grid-button auto-nonconfirm reef"><img src="/assets/icons/coral.svg"
				class="grid-icon coral" /></button>
		<button id="auto-intake-miss" class="grid-button auto-nonconfirm miss"><img src="/assets/icons/download.svg"
				class="grid-icon" /></button>
		<button class="grid-button auto-nonconfirm penalty"><img src="/assets/icons/error.svg" class="grid-icon" /></button>

		<button class="grid-button auto-confirm success" id="auto-success" style="display:none"><img
				src="/assets/icons/check.svg" class="grid-icon" /></button>
		<button class="grid-button auto-confirm failure" id="auto-failure" style="display:none"><img
				src="/assets/icons/error.svg" class="grid-icon" /></button>
	</div>
	<label for="auto">Auto</label>
	<select name="auto" id="auto" class="field">
		<option value="none">Unknown</option>
	</select>
	<h2>Teleop</h2>
	<div class="section-grid" style="grid-template-columns: repeat(3, minmax(0, 1fr));">
		<button id="coral-l4" class="grid-button teleop-nonconfirm reef"><img src="/assets/icons/coral.svg"
				class="grid-icon coral" /></button>
		<button id="processor" class="grid-button teleop-nonconfirm"><img src="/assets/icons/window.svg"
				class="grid-icon" /></button>
		<button id="processor-miss" class="grid-button teleop-nonconfirm miss"><img src="/assets/icons/window.svg"
				class="grid-icon" /></button>

		<button id="coral-l3" class="grid-button teleop-nonconfirm reef"><img src="/assets/icons/coral.svg"
				class="grid-icon coral" /></button>
		<button id="intake" class="grid-button teleop-nonconfirm"><img src="/assets/icons/download.svg"
				class="grid-icon" /></button>
		<button id="intake-miss" class="grid-button teleop-nonconfirm miss"><img src="/assets/icons/download.svg"
				class="grid-icon" /></button>

		<button id="coral-l2" class="grid-button teleop-nonconfirm reef"><img src="/assets/icons/coral.svg"
				class="grid-icon coral" /></button>
		<button id="net" class="grid-button teleop-nonconfirm"><img src="/assets/icons/hashtag.svg"
				class="grid-icon" /></button>
		<button id="agitate" class="grid-button teleop-nonconfirm"><img src="/assets/icons/upload.svg"
				class="grid-icon" /></button>

		<button id="coral-l1" class="grid-button teleop-nonconfirm reef"><img src="/assets/icons/coral.svg"
				class="grid-icon coral" /></button>
		<button id="defend" class="grid-button teleop-nonconfirm"><img src="/assets/icons/shield.svg"
				class="grid-icon" /></button>
		<button class="grid-button teleop-nonconfirm penalty"><img src="/assets/icons/error.svg"
				class="grid-icon" /></button>

		<button class="grid-button teleop-confirm success" id="teleop-success" style="display:none"><img
				src="/assets/icons/check.svg" class="grid-icon" /></button>
		<button class="grid-button teleop-confirm failure" id="teleop-failure" style="display:none"><img
				src="/assets/icons/error.svg" class="grid-icon" /></button>
	</div>
	<h2>Climb</h2>
	<div class="section-grid">
		<button id="start-shallow" class="cont grid-button"><img src="/assets/icons/box.svg" class="grid-icon" />
			Start Shallow</button>
		<button id="start-deep" class="cont grid-button"><img src="/assets/icons/box.svg" class="grid-icon" />
			Start Deep</button>
		<button id="climb-fail" class="cont grid-button miss"><img src="/assets/icons/error.svg" class="grid-icon" />
			Time Expired</button>
		<button id="climb-fall" class="cont grid-button miss"><img src="/assets/icons/download.svg" class="grid-icon" />
			Fell Down</button>
		<button id="climb-successful" class="cont grid-button"><img src="/assets/icons/check.svg" class="grid-icon" />
			Successful</button>
	</div>
	<h2>Post-Match</h2>
	<div class="cont">
		<input type="checkbox" name="won" id="won" class="field" />
		<label for="won">Won?</label>
	</div>
	<label for="status">Robot Status</label>
	<select id="status" name="status">
		<option value="Good">Good</option>
		<option value="Questionable">Questionable</option>
		<option value="Broken">Broken</option>
	</select>
	<div class="cont">
		<input type="checkbox" name="collision" id="collision" class="field" />
		<label for="collision">Collision During Auto?</label>
	</div>
	<h2>Review</h2>
	<label for="notes">Match Notes</label>
	<textarea name="notes" id="notes" class="round border" placeholder="Enter extra match notes here..."></textarea>
	<div class="cont">
		<button id="clear">Clear</button>
		<button id="submit">Submit</button>
	</div>
</div>
<script>
	// Object for all processing about the match
	var M = {};
	// Pending event for success buttons
	var pendingEvent = null;

	// Initializes the match data. Can be used to clear the match data as well.
	function initMatchData() {
		M = {
			// The time when the timer was last resumed, number or null
			startTime: null,
			// The base time, set whenever the timer is paused
			baseTime: 0,
			// The total time
			time: 0,
			timerRunning: false,
			timeScale: 1,
			timeOffset: 0,
			// Has a list of all events during teleop and auto, as {teleop: bool, id: string, timestamp: number}. Events with a success will have a success: bool field. Coral events will have a level: number field.
			matchEvents: [],
			climbType: "none",
			climbStart: null,
			climbEnd: null,
			climbResult: "failed"
		};
		pendingEvent = null;
		hideAutoConfirm();
		hideTeleopConfirm();
	}

	initMatchData();

	let timerValue = document.getElementById("match-time-value");

	// Background task for updating the timer
	setInterval(() => {
		if (M.timerRunning && M.startTime != null) {
			// Length of a match plus extra, with the offset removed to account for it
			if (M.time - M.timeOffset > 150) {
				M.timerRunning = false;
				document.getElementById("time-pause-button").innerHTML = "Match Finished";
			} else {
				let now = Date.now() / 1000;
				let delta = (now - M.startTime) * M.timeScale;
				M.time = M.baseTime + delta;
			}
		}

		timerValue.innerHTML = renderTime(M.time);
	}, 100);

	function resetTimeBase() {
		M.startTime = Date.now() / 1000;
		M.baseTime = M.time;
	}

	document.getElementById("time-pause-button").addEventListener("click", (e) => {
		// Match is over
		if (M.time > 140) {
			return;
		}

		if (M.timerRunning) {
			e.target.innerHTML = "Play";
		} else {
			resetTimeBase();
			e.target.innerHTML = "Pause";
		}
		M.timerRunning = !M.timerRunning;
	});

	// Changing the speed of the timer
	document.getElementById("time-speed").addEventListener("change", (e) => {
		// Update the time base to prevent speed changes from changing the total time
		resetTimeBase();
		M.timeScale = e.target.value * 1;
	});

	// Time editing
	let timeEditField = document.getElementById("time-edit-field");
	let timeOffsetField = document.getElementById("time-offset");
	let timeEditPopupContainer = document.getElementById("time-edit-popup-container");
	document.getElementById("time-edit-button").addEventListener("click", (e) => {
		if (M.timerRunning) {
			return;
		}

		timeEditField.value = renderTime(M.time);
		timeOffsetField.value = renderTime(M.timeOffset);
		timeEditPopupContainer.style.display = "";
	});
	document.getElementById("time-edit-form").addEventListener("submit", (e) => {
		e.preventDefault();

		let newTime = parseTime(timeEditField.value);
		if (newTime != -1) {
			M.time = newTime;
			resetTimeBase();
		} else {
			setError("Invalid time");
		}

		let timeOffset = parseTime(timeOffsetField.value);
		if (timeOffset != -1) {
			M.timeOffset = timeOffset;
		} else {
			setError("Invalid time");
		}

		timeEditPopupContainer.style.display = "none";
	});
	document.getElementById("time-edit-cancel").addEventListener("click", (e) => {
		e.preventDefault();
		timeEditPopupContainer.style.display = "none";
	});

	// Event buttons
	document.getElementById("auto-coral-l4").addEventListener("click", () => {
		setAutoPendingEvent({
			teleop: false,
			id: "coral",
			level: 3,
			timestamp: M.time,
		});
	});
	document.getElementById("auto-coral-l3").addEventListener("click", () => {
		setAutoPendingEvent({
			teleop: false,
			id: "coral",
			level: 2,
			timestamp: M.time,
		});
	});
	document.getElementById("auto-coral-l2").addEventListener("click", () => {
		setAutoPendingEvent({
			teleop: false,
			id: "coral",
			level: 1,
			timestamp: M.time,
		});
	});
	document.getElementById("auto-coral-l1").addEventListener("click", () => {
		setAutoPendingEvent({
			teleop: false,
			id: "coral",
			level: 0,
			timestamp: M.time,
		});
	});
	document.getElementById("auto-algae").addEventListener("click", () => {
		M.matchEvents.push({
			teleop: false,
			id: "algae",
			timestamp: M.time,
			successful: true
		});
	});
	document.getElementById("auto-algae-miss").addEventListener("click", () => {
		M.matchEvents.push({
			teleop: false,
			id: "algae",
			timestamp: M.time,
			successful: false
		});
	});
	document.getElementById("auto-intake").addEventListener("click", () => {
		M.matchEvents.push({
			teleop: false,
			id: "intake",
			timestamp: M.time,
			successful: true
		});
	});
	document.getElementById("auto-intake-miss").addEventListener("click", () => {
		M.matchEvents.push({
			teleop: false,
			id: "intake",
			timestamp: M.time,
			successful: false
		});
	});
	document.getElementById("coral-l4").addEventListener("click", () => {
		setTeleopPendingEvent({
			teleop: true,
			id: "coral",
			level: 3,
			timestamp: M.time,
		});
	});
	document.getElementById("coral-l3").addEventListener("click", () => {
		setTeleopPendingEvent({
			teleop: true,
			id: "coral",
			level: 2,
			timestamp: M.time,
		});
	});
	document.getElementById("coral-l2").addEventListener("click", () => {
		setTeleopPendingEvent({
			teleop: true,
			id: "coral",
			level: 1,
			timestamp: M.time,
		});
	});
	document.getElementById("coral-l1").addEventListener("click", () => {
		setTeleopPendingEvent({
			teleop: true,
			id: "coral",
			level: 0,
			timestamp: M.time,
		});
	});
	document.getElementById("processor").addEventListener("click", () => {
		M.matchEvents.push({
			teleop: true,
			id: "processor",
			timestamp: M.time,
			successful: true
		});
	});
	document.getElementById("processor-miss").addEventListener("click", () => {
		M.matchEvents.push({
			teleop: true,
			id: "processor",
			timestamp: M.time,
			successful: false
		});
	});
	document.getElementById("intake").addEventListener("click", () => {
		M.matchEvents.push({
			teleop: true,
			id: "intake",
			timestamp: M.time,
			successful: true
		});
	});
	document.getElementById("intake-miss").addEventListener("click", () => {
		M.matchEvents.push({
			teleop: true,
			id: "intake",
			timestamp: M.time,
			successful: false
		});
	});
	document.getElementById("net").addEventListener("click", () => {
		M.matchEvents.push({
			teleop: true,
			id: "net",
			timestamp: M.time,
			successful: true
		});
	});
	document.getElementById("agitate").addEventListener("click", () => {
		M.matchEvents.push({
			teleop: true,
			id: "agitate",
			timestamp: M.time
		});
	});
	document.getElementById("defend").addEventListener("click", () => {
		M.matchEvents.push({
			teleop: true,
			id: "defend",
			timestamp: M.time
		});
	});

	// To fix the minifier
	let penalty = "penalty";
	for (let elem of document.getElementsByClassName(penalty)) {
		elem.addEventListener("click", () => {
			M.matchEvents.push({
				teleop: false,
				id: penalty,
				timestamp: M.time
			});
		})
	}

	function setAutoPendingEvent(event) {
		pendingEvent = event;
		for (let e of document.getElementsByClassName("auto-confirm")) {
			e.style.display = "";
		}
		for (let e of document.getElementsByClassName("auto-nonconfirm")) {
			e.style.display = "none";
		}
	}

	document.getElementById("auto-success").addEventListener("click", () => {
		if (pendingEvent != null) {
			pendingEvent.successful = true;
			M.matchEvents.push(pendingEvent);
		}
		pendingEvent = null;
		hideAutoConfirm();
	});

	document.getElementById("auto-failure").addEventListener("click", () => {
		if (pendingEvent != null) {
			pendingEvent.successful = false;
			M.matchEvents.push(pendingEvent);
		}
		pendingEvent = null;
		hideAutoConfirm();
	});

	function hideAutoConfirm() {
		for (let e of document.getElementsByClassName("auto-confirm")) {
			e.style.display = "none";
		}
		for (let e of document.getElementsByClassName("auto-nonconfirm")) {
			e.style.display = "";
		}
	}

	function setTeleopPendingEvent(event) {
		pendingEvent = event;
		for (let e of document.getElementsByClassName("teleop-confirm")) {
			e.style.display = "";
		}
		for (let e of document.getElementsByClassName("teleop-nonconfirm")) {
			e.style.display = "none";
		}
	}

	document.getElementById("teleop-success").addEventListener("click", () => {
		if (pendingEvent != null) {
			pendingEvent.successful = true;
			M.matchEvents.push(pendingEvent);
		}
		pendingEvent = null;
		hideTeleopConfirm();
	});

	document.getElementById("teleop-failure").addEventListener("click", () => {
		if (pendingEvent != null) {
			pendingEvent.successful = false;
			M.matchEvents.push(pendingEvent);
		}
		pendingEvent = null;
		hideTeleopConfirm();
	});

	function hideTeleopConfirm() {
		for (let e of document.getElementsByClassName("teleop-confirm")) {
			e.style.display = "none";
		}
		for (let e of document.getElementsByClassName("teleop-nonconfirm")) {
			e.style.display = "";
		}
	}

	document.getElementById("start-shallow").addEventListener("click", () => {
		M.climbType = "shallow";
		M.climbStart = M.time;
	});
	document.getElementById("start-deep").addEventListener("click", () => {
		M.climbType = "deep";
		M.climbStart = M.time;
	});
	document.getElementById("climb-fail").addEventListener("click", () => {
		if (M.climbStart != null) {
			M.climbResult = "failed";
			M.climbEnd = M.time;
		}
	});
	document.getElementById("climb-fall").addEventListener("click", () => {
		if (M.climbStart != null) {
			M.climbResult = "fell";
			M.climbEnd = M.time;
		}
	});
	document.getElementById("climb-successful").addEventListener("click", () => {
		if (M.climbStart != null) {
			M.climbResult = "succeeded";
			M.climbEnd = M.time;
		}
	});

	function onSubmit(event) {
		event.preventDefault();

		// Calculate stats from all the events

		let isReverseCycle = false;
		let cycleStartTime = null;
		let cycleTimes = [];

		let autoCoralAttempts = [];
		let autoAlgaeAttempts = 0;
		let autoAlgaeScores = 0;
		let autoIntakeAttempts = 0;
		let autoIntakeSuccesses = 0;

		let teleopCoralAttempts = [];
		let teleopIntakeAttempts = 0;
		let teleopIntakeSuccesses = 0;
		let agitations = 0;
		let processorAttempts = 0;
		let processorScores = 0;
		let netShots = 0;
		let defenses = 0;

		let penalties = 0;
		let totalScore = 0;

		M.matchEvents.sort((a, b) => a - b);

		for (let event of M.matchEvents) {
			// Totals and score calculations
			if (event.id == "coral") {
				let attempt = {
					successful: event.successful,
					level: `l${event.level + 1}`,
				}
				if (event.teleop) {
					totalScore += event.level;
					totalScore += 2;
					teleopCoralAttempts.push(attempt);
				} else {
					totalScore += event.level;
					totalScore += 3;
					if (event.level > 1) {
						totalScore += 1;
					}
					autoCoralAttempts.push(attempt);
				}
			} else if (event.id == "algae") {
				totalScore += 4;
				autoAlgaeAttempts++;
				if (event.successful) {
					autoAlgaeScores++;
				}
			} else if (event.id == "processor") {
				totalScore += 4;
				processorAttempts++;
				if (event.successful) {
					processorScores++;
				}
			} else if (event.id == "net") {
				totalScore += 4;
				netShots++;
			} else if (event.id == "intake") {
				if (event.teleop) {
					teleopIntakeAttempts++;
					if (event.successful) {
						teleopIntakeSuccesses++;
					}
				} else {
					autoIntakeAttempts++;
					if (event.successful) {
						autoIntakeSuccesses++;
					}
				}
			} else if (event.id == "agitate") {
				agitations++;
			} else if (event.id == "defend") {
				defenses++;
			} else if (event.id == "penalty") {
				penalties++;
				totalScore -= 4;
			}

			// Cycles
			if (event.teleop) {
				if (event.successful != undefined && event.successful) {
					if (event.id == "intake") {
						if (isReverseCycle) {
							cycleTimes.push(cycleStartTime);
							cycleStartTime = null;
							isReverseCycle = false;
						}
						cycleStartTime = event.timestamp;
					} else if (event.id == "coral" || event.id == "processor" || event.id == "net") {
						if (cycleStartTime != null) {
							isReverseCycle = true;
						}
					}
				}
			}
		}

		// Auto cross line points
		if (autoAlgaeAttempts > 0 || autoCoralAttempts.length > 0 || autoIntakeAttempts > 0) {
			totalScore += 3;
		}

		// Climb points
		if (M.climb_attempted != "none") {
			totalScore += 2;
		}
		if (M.climb_result == "succeeded") {
			if (M.climb_attempted == "shallow") {
				totalScore += 6;
			} else if (M.climb_attempted == "deep") {
				totalScore += 12;
			}
		}

		let cycleTimeSum = 0;
		for (let i = 1; i < cycleTimes.length; i++) {
			let delta = cycleTimes[i] - cycleTimes[i - 1];
			cycleTimeSum += delta;
		}
		let cycleTime = 0;
		// Prevent div by zero
		if (cycleTimes.length > 1) {
			cycleTime = cycleTimeSum / (cycleTimes.length - 1);
		}

		// Get the match number
		let matchNumberString = document.getElementById("match-number").value;
		let matchNumber = null;
		if (matchNumberString.length >= 2) {
			let type = null;
			if (matchNumberString[0] == "Q") {
				type = "Qualification";
			} else if (matchNumberString[0] == "P") {
				type = "Playoff";
			}
			if (type == null) {
				setError("Invalid match type in match number");
				return;
			}
			let number = matchNumberString.substring(1);
			if (isNaN(number) || isNaN(parseFloat(number))) {
				setError("Invalid match number");
				return;
			}
			number = number * 1;
			matchNumber = {
				ty: type,
				num: number,
			};
		}

		let auto = document.getElementById("auto").value;
		if (auto == "none") {
			auto = null;
		}

		let competition = document.getElementById("competition").value;
		if (competition == "none") {
			competition = null;
		} else {
			competition = competition.split(/\.?(?=[A-Z])/).join('_').toLowerCase();
		}

		const data = {
			team_number: document.getElementById("team-number").value * 1,
			match_id: "",
			match_number: matchNumber,
			competition: competition,
			recorded_live: document.getElementById("recorded-live").checked,
			auto: auto,
			auto_collision: document.getElementById("collision").checked,
			auto_coral_attempts: autoCoralAttempts,
			auto_algae_attempts: autoAlgaeAttempts,
			auto_algae_scores: autoAlgaeScores,
			auto_intake_attempts: autoIntakeAttempts,
			auto_intake_successes: autoIntakeSuccesses,
			teleop_coral_attempts: teleopCoralAttempts,
			teleop_intake_attempts: teleopIntakeAttempts,
			teleop_intake_successes: teleopIntakeSuccesses,
			agitations: agitations,
			processor_attempts: processorAttempts,
			processor_scores: processorScores,
			net_shots: netShots,
			climb_attempted: M.climbType,
			climb_result: M.climbResult,
			climb_time: M.climbEnd - M.climbStart,
			points_scored: totalScore,
			defenses: defenses,
			penalties: penalties,
			cycle_time: cycleTime,
			cycle_times: cycleTimes,
			status: document.getElementById("status").value,
			showed_up: document.getElementById("showed-up").checked,
			won: document.getElementById("won").checked,
			notes: document.getElementById("notes").value,
		};
		const dataReady = encodeURIComponent(JSON.stringify(data));

		fetch("/api/post_match_stats", {
			method: "POST",
			body: `data=${dataReady}&stats_id={{stats-id}}`,
			headers: { "Content-Type": "application/x-www-form-urlencoded" },
		}).then((response) => {
			if (response.status != 200) {
				setError("Failed to post match results: " + response.statusText);
				return;
			}
			window.location.href = "/scouting";
		});
	}

	document.getElementById("submit").addEventListener("click", onSubmit);

	document.getElementById("clear").addEventListener("click", () => {
		initMatchData();
		document.getElementById("team-number").value = null;
		document.getElementById("showed-up").checked = false;
		document.getElementById("won").checked = false;
		document.getElementById("broken").checked = false;
		document.getElementById("notes").value = "";

		document.getElementById("time-speed").value = "1";
		document.getElementById("time-pause-button").innerHTML = "Play";
	});

	// Fill in auto options when a team is selected (the element is unfocused)
	document.getElementById("team-number").addEventListener("change", (e) => {
		fetch(`/api/get_autos/${e.target.value}`).then((response) => {
			if (response.status != 200) {
				setError("Failed to get autos for team: " + response.statusText);
				return;
			}

			response.text().then((text) => {
				try {
					let autos = JSON.parse(text);
					let select = document.getElementById("auto");
					// Clear the existing options
					select.innerHTML = "";
					select.appendChild(createOption("none", "Unknown"));
					for (let auto of autos) {
						select.appendChild(createOption(auto.id, auto.name));
					}
				} catch (e) {
					setError("Failed to parse autos: " + e);
				}
			})
		});
	});

	// Creates an option element
	function createOption(value, name) {
		let out = document.createElement("option");
		out.value = value;
		out.innerHTML = name;
		return out;
	}

	// Parses a time (m:ss or s). Returns -1 on error.
	function parseTime(time) {
		let elems = time.split(':');
		if (elems.length == 2) {
			return elems[0] * 60 + elems[1] * 1;
		} else if (elems.length == 1) {
			return elems[0] * 1;
		} else {
			return -1;
		}
	}

	// Renders a time as m:ss
	function renderTime(time) {
		let minutes = Math.floor(time / 60);
		let seconds = time % 60;
		// Pad the seconds with a zero
		let secondsFormatted = seconds.toFixed(1);
		if (seconds < 10) {
			secondsFormatted = "0" + secondsFormatted;
		}

		return `${minutes}:${secondsFormatted}`;
	}
</script>
