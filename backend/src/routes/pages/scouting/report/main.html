{{worbots-header}}{{error}}
<h1>Match Report</h1>
<div class="cont">
	<button onclick="history.back()">Back</button>
</div>
<br />
<div id="time-container">
	<div class="cont">
		<div id="match-time" class="cont round">
			<div id="match-time-value">0:00.0</div>
			<button id="time-edit-button">Edit</button>
			<button id="time-pause-button">Start</button>
			<select id="time-speed">
				<option value="1" selected>1x</option>
				<option value="0.5">0.5x</option>
				<option value="0.25">0.25x</option>
			</select>
		</div>
	</div>
</div>
<div id="time-edit-popup-container" class="cont" style="display:none">
	<div id="time-edit-popup" class="cont col round">
		<h3>Edit Time</h3>
		<form id="time-edit-form" class="cont col">
			<label for="time-value">Time Value</label>
			<input type="text" id="time-edit-field" name="time-value" />
			<label for="time-offset">Time Offset</label>
			<input type="text" id="time-offset" name="time-offset" />
			<div class="cont">
				<button id="time-edit-cancel" style="background-color: var(--bg3)">Cancel</button>
				<input type="submit" value="Save" />
			</div>
		</form>
	</div>
</div>
<br />
<div id="match-report" class="cont col">
	<h2>Pre-Match</h2>
	<label for="team-number">Team Number</label>
	<input type="number" class="field" name="team-number" id="team-number" placeholder="0000" />
	<div class="cont">
		<input type="checkbox" name="recorded-live" id="recorded-live" class="field" />
		<label for="recorded-live">Recording Live?</label>
	</div>
	<div class="cont">
		<input type="checkbox" name="showed-up" id="showed-up" class="field" />
		<label for="showed-up">Showed Up?</label>
	</div>
	<h2>Auto</h2>
	<div class="section-grid">
		<button id="auto-score" class="grid-button">Score</button>
		<button id="auto-miss" class="grid-button miss">Miss</button>
		<button id="auto-intake" class="grid-button">Intake</button>
		<button id="auto-intake-miss" class="grid-button miss">Intake Miss</button>
		<button class="grid-button penalty">Penalty</button>
	</div>
	<label for="auto">Auto</label>
	<select name="auto" id="auto" class="field">
		<option value="none">Unknown</option>
	</select>
	<h2>Teleop</h2>
	<div class="section-grid">
		<button id="speaker-score" class="grid-button">Speaker Score</button>
		<button id="speaker-miss" class="grid-button miss">Speaker Miss</button>
		<button id="amp-score" class="grid-button">Amp Score</button>
		<button id="amp-miss" class="grid-button miss">Amp Miss</button>
		<button id="pass" class="grid-button">Pass</button>
		<button id="defend" class="grid-button">Defend</button>
		<button id="amplify" class="grid-button">Amplify</button>
		<button class="grid-button penalty">Penalty</button>
	</div>
	<h2>Post-Match</h2>
	<div class="cont">
		<input type="checkbox" name="climb-attempted" id="climb-attempted" class="field" />
		<label for="climb-attempted">Climb Attempted?</label>
	</div>
	<div class="cont">
		<input type="checkbox" name="climb-successful" id="climb-successful" class="field" />
		<label for="climb-attempted">Climb Successful?</label>
	</div>
	<div class="cont">
		<input type="checkbox" name="trap-attempted" id="trap-attempted" class="field" />
		<label for="trap-attempted">Trap Attempted?</label>
	</div>
	<div class="cont">
		<input type="checkbox" name="trap-successful" id="trap-successful" class="field" />
		<label for="trap-attempted">Trap Successful?</label>
	</div>
	<div class="cont">
		<input type="checkbox" name="won" id="won" class="field" />
		<label for="won">Won?</label>
	</div>
	<label for="status">Robot Status</label>
	<select id="status" name="status">
		<option value="Good">Good</option>
		<option value="Injured">Injured</option>
		<option value="Broken">Broken</option>
	</select>
	<div class="cont">
		<input type="checkbox" name="collision" id="collision" class="field" />
		<label for="collision">Collision During Auto?</label>
	</div>
	<h2>Review</h2>
	<label for="notes">Match Notes</label>
	<textarea name="notes" id="notes" class="round border" placeholder="Enter extra match notes here..."></textarea>
	<div class="cont">
		<button id="clear">Clear</button>
		<button id="submit">Submit</button>
	</div>
</div>
<script>
	// Object for all processing about the match
	var M = {};

	// Initializes the match data. Can be used to clear the match data as well.
	function initMatchData() {
		M = {
			// The time when the timer was last resumed, number or null
			startTime: null,
			// The base time, set whenever the timer is paused
			baseTime: 0,
			// The total time
			time: 0,
			timerRunning: false,
			timeScale: 1,
			timeOffset: 0,
			// Contains a list of [timestamp: number, success: bool]
			autoScores: [],
			autoIntakes: [],
			speakerScores: [],
			ampScores: [],
			totalAutoScores: 0,
			totalSpeakerScores: 0,
			totalAmpScores: 0,
			ampStartTime: null,
			amplifications: 0,
			amplifiedScores: 0,
			passes: 0,
			defenses: 0,
			penalties: 0
		};
	}

	initMatchData();

	let timerValue = document.getElementById("match-time-value");

	// Background task for updating the timer
	setInterval(() => {
		if (M.timerRunning && M.startTime != null) {
			// Length of a match plus extra, with the offset removed to account for it
			if (M.time - M.timeOffset > 140) {
				M.timerRunning = false;
				document.getElementById("time-pause-button").innerHTML = "Match Finished";
			} else {
				let now = Date.now() / 1000;
				let delta = (now - M.startTime) * M.timeScale;
				M.time = M.baseTime + delta;

				// Turn off amplify button automatically
				if (M.ampStartTime != null && now - M.ampStartTime > 10) {
					M.ampStartTime = null;
					let elem = document.getElementById("amplify");
					elem.innerHTML = "Amplify";
					elem.classList.remove("selected");
				}
			}
		}

		timerValue.innerHTML = renderTime(M.time);
	}, 100);

	function resetTimeBase() {
		M.startTime = Date.now() / 1000;
		M.baseTime = M.time;
	}

	document.getElementById("time-pause-button").addEventListener("click", (e) => {
		// Match is over
		if (M.time > 140) {
			return;
		}

		if (M.timerRunning) {
			e.target.innerHTML = "Play";
		} else {
			resetTimeBase();
			e.target.innerHTML = "Pause";
		}
		M.timerRunning = !M.timerRunning;
	});

	// Changing the speed of the timer
	document.getElementById("time-speed").addEventListener("change", (e) => {
		// Update the time base to prevent speed changes from changing the total time
		resetTimeBase();
		M.timeScale = e.target.value * 1;
	});

	// Time editing
	let timeEditField = document.getElementById("time-edit-field");
	let timeOffsetField = document.getElementById("time-offset");
	let timeEditPopupContainer = document.getElementById("time-edit-popup-container");
	document.getElementById("time-edit-button").addEventListener("click", (e) => {
		if (M.timerRunning) {
			return;
		}

		timeEditField.value = renderTime(M.time);
		timeOffsetField.value = renderTime(M.timeOffset);
		timeEditPopupContainer.style.display = "";
	});
	document.getElementById("time-edit-form").addEventListener("submit", (e) => {
		e.preventDefault();

		let newTime = parseTime(timeEditField.value);
		if (newTime != -1) {
			M.time = newTime;
			resetTimeBase();
		} else {
			setError("Invalid time");
		}

		let timeOffset = parseTime(timeOffsetField.value);
		if (timeOffset != -1) {
			M.timeOffset = timeOffset;
		} else {
			setError("Invalid time");
		}

		timeEditPopupContainer.style.display = "none";
	});
	document.getElementById("time-edit-cancel").addEventListener("click", (e) => {
		e.preventDefault();
		timeEditPopupContainer.style.display = "none";
	});

	// Event buttons
	document.getElementById("auto-score").addEventListener("click", () => {
		M.autoScores.push([M.time, true]);
		M.totalAutoScores++;
	});
	document.getElementById("auto-miss").addEventListener("click", () => {
		M.autoScores.push([M.time, false]);
	});
	document.getElementById("auto-intake").addEventListener("click", () => {
		M.autoIntakes.push([M.time, true]);
	});
	document.getElementById("auto-intake-miss").addEventListener("click", () => {
		M.autoIntakes.push([M.time, false]);
	});
	document.getElementById("speaker-score").addEventListener("click", () => {
		M.speakerScores.push([M.time, true]);
		if (M.ampStartTime != null) {
			M.amplifiedScores++;
		}
		M.totalSpeakerScores++;
	});
	document.getElementById("speaker-miss").addEventListener("click", () => {
		M.speakerScores.push([M.time, false]);
	});
	document.getElementById("amp-score").addEventListener("click", () => {
		M.ampScores.push([M.time, true]);
		M.totalAmpScores++;
	});
	document.getElementById("amp-miss").addEventListener("click", () => {
		M.ampScores.push([M.time, false]);
	});
	document.getElementById("pass").addEventListener("click", () => {
		M.passes++;
	});
	document.getElementById("defend").addEventListener("click", () => {
		M.defenses++;
	});
	for (let elem of document.getElementsByClassName("penalty")) {
		elem.addEventListener("click", () => {
			M.penalties++;
		})
	}

	document.getElementById("amplify").addEventListener("click", (e) => {
		if (M.ampStartTime == null) {
			M.ampStartTime = Date.now() / 1000;
			M.amplifications++;
			e.target.innerHTML = "Amplified!";
			e.target.classList.add("selected");
		} else {
			M.ampStartTime = null;
			e.target.innerHTML = "Amplify";
			e.target.classList.remove("selected");
		}
	});

	function onSubmit(event) {
		event.preventDefault();

		// Calculate cycle times and cycle time average
		let cycleTimes = [];
		for (let item of M.ampScores.concat(M.speakerScores)) {
			if (item[1]) {
				cycleTimes.push(item[0] - M.timeOffset);
			}
		}
		// Cycle times will be out of order due to the amp and speaker scores being concatted
		cycleTimes.sort((a, b) => a - b);

		let cycleTimeSum = 0;
		for (let i = 1; i < cycleTimes.length; i++) {
			let delta = cycleTimes[i] - cycleTimes[i - 1];
			cycleTimeSum += delta;
		}
		let cycleTime = 0;
		// Prevent div by zero
		if (cycleTimes.length > 1) {
			cycleTime = cycleTimeSum / (cycleTimes.length - 1);
		}

		let climbSuccess = document.getElementById("climb-successful").checked;
		let trapSuccess = document.getElementById("trap-successful").checked;

		// Calculate points scored
		let pointsScored = 0;
		pointsScored += M.totalAutoScores;
		pointsScored += M.totalAmpScores;
		pointsScored += (M.totalSpeakerScores - M.amplifiedScores) * 2;
		pointsScored += M.amplifiedScores * 5;
		pointsScored += climbSuccess ? 3 : 0;
		pointsScored += trapSuccess ? 5 : 0;

		// Record auto shots
		let autoShots = [];
		for (let shot of M.autoScores) {
			autoShots.push(shot[1]);
		}

		let auto = document.getElementById("auto").value;
		if (auto == "none") {
			auto = null;
		}

		// We do lots of conversions to integers with * 1 here
		const data = {
			team_number: document.getElementById("team-number").value * 1,
			match_id: "",
			recorded_live: document.getElementById("recorded-live").checked,
			auto_shots: autoShots,
			auto: auto,
			auto_attempts: M.autoScores.length,
			auto_scores: M.totalAutoScores,
			auto_collision: document.getElementById("collision").checked,
			points_scored: pointsScored,
			amp_attempts: M.ampScores.length,
			amp_scores: M.totalAmpScores,
			speaker_attempts: M.speakerScores.length,
			speaker_scores: M.totalSpeakerScores,
			climb_attempted: document.getElementById("climb-attempted").checked,
			climb_successful: climbSuccess,
			trap_attempted: document.getElementById("trap-attempted").checked,
			trap_successful: trapSuccess,
			amplifications: M.amplifications,
			amplified_notes: M.amplifiedScores,
			passes: M.passes,
			defenses: M.defenses,
			penalties: M.penalties,
			cycle_time: cycleTime,
			cycle_times: cycleTimes,
			status: document.getElementById("status").value,
			showed_up: document.getElementById("showed-up").checked,
			won: document.getElementById("won").checked,
			notes: document.getElementById("notes").value,
		};
		const dataReady = encodeURIComponent(JSON.stringify(data));

		fetch("/api/post_match_stats", {
			method: "POST",
			body: `data=${dataReady}`,
			headers: { "Content-Type": "application/x-www-form-urlencoded" },
		}).then((response) => {
			if (response.status != 200) {
				setError("Failed to post match results: " + response.statusText);
				return;
			}
			window.location.href = "/scouting";
		});
	}

	document.getElementById("submit").addEventListener("click", onSubmit);

	document.getElementById("clear").addEventListener("click", () => {
		initMatchData();
		document.getElementById("team-number").value = null;
		document.getElementById("showed-up").checked = false;
		document.getElementById("climb-attempted").checked = false;
		document.getElementById("climb-successful").checked = false;
		document.getElementById("trap-attempted").checked = false;
		document.getElementById("trap-successful").checked = false;
		document.getElementById("won").checked = false;
		document.getElementById("broken").checked = false;
		document.getElementById("notes").value = "";

		document.getElementById("time-speed").value = "1";
		document.getElementById("time-pause-button").innerHTML = "Play";
	});

	// Fill in auto options when a team is selected (the element is unfocused)
	document.getElementById("team-number").addEventListener("change", (e) => {
		fetch(`/api/get_autos/${e.target.value}`).then((response) => {
			if (response.status != 200) {
				setError("Failed to get autos for team: " + response.statusText);
				return;
			}

			response.text().then((text) => {
				try {
					let autos = JSON.parse(text);
					let select = document.getElementById("auto");
					// Clear the existing options
					select.innerHTML = "";
					select.appendChild(createOption("none", "Unknown"));
					for (let auto of autos) {
						select.appendChild(createOption(auto.id, auto.name));
					}
				} catch (e) {
					setError("Failed to parse autos: " + e);
				}
			})
		});
	});

	// Creates an option element
	function createOption(value, name) {
		let out = document.createElement("option");
		out.value = value;
		out.innerHTML = name;
		return out;
	}

	// Parses a time (m:ss or s). Returns -1 on error.
	function parseTime(time) {
		let elems = time.split(':');
		if (elems.length == 2) {
			return elems[0] * 60 + elems[1] * 1;
		} else if (elems.length == 1) {
			return elems[0] * 1;
		} else {
			return -1;
		}
	}

	// Renders a time as m:ss
	function renderTime(time) {
		let minutes = Math.floor(time / 60);
		let seconds = time % 60;
		// Pad the seconds with a zero
		let secondsFormatted = seconds.toFixed(1);
		if (seconds < 10) {
			secondsFormatted = "0" + secondsFormatted;
		}

		return `${minutes}:${secondsFormatted}`;
	}
</script>
<style>
	#time-container {
		position: sticky;
		top: 0.8rem;
	}

	#match-time {
		background-color: var(--bg2);
		padding: 0.8rem;
		width: 80%;
	}

	#time-edit-button {
		background-color: var(--bg3);
	}

	#time-speed {
		width: 4rem;
	}

	#time-edit-popup-container {
		position: fixed;
		left: 0;
		top: 0;
		width: 100vw;
		height: 100vh;
		z-index: 100;
		background-color: rgba(0, 0, 0, 0.5);
	}

	#time-edit-popup {
		background-color: var(--bg2);
		padding: 0.3rem 2.5rem 1.5rem;
	}

	.miss,
	.penalty,
	#clear {
		background-color: var(--wbred);
	}

	.miss:hover,
	.penalty:hover,
	#clear:hover {
		background-color: var(--wbredacc);
	}

	.section-grid {
		display: grid;
		grid-template-columns: repeat(2, minmax(0, 1fr));
		width: 20rem;
	}

	.grid-button {
		margin: 0.4rem;
	}

	#pass,
	#defend {
		background-color: var(--bg3);
	}

	#amplify {
		background-color: goldenrod;
	}

	#amplify.selected {
		background-color: gold;
		color: var(--bg);
	}
</style>
{{footer}}
