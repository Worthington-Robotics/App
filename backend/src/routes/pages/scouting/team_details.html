{{worbots-header}}{{error}}
<div class="cont col" id="team-details">
	<h1>{{name}}</h1>
	<h3 class="details-subtitle number">{{number}}</h3>
	<div class="cont">
		<button onclick="history.back()">Back</button>
	</div>
	<div class="cont">
		<div class="cont">
			<img src="/assets/icons/clock.svg" class="details-icon" />
			{{rookie-year}}
		</div>
	</div>
	<h2>Stats</h2>
	<div class="cont col" id="stats">
		<div class="cont" id="stats-tabs">
			<div class="round stats-tab" id="overall-tab">Overall</div>
			<div class="round stats-tab" id="auto-tab">Auto</div>
			<div class="round stats-tab" id="teleop-tab">Teleop</div>
		</div>
		<div class="cont" id="stats-body">
			<div class="stats-section" id="overall-section">
				<div class="stats-grid">
					{{epa}}
					{{apa}}
					{{win-rate}}
					{{matches}}
					{{availability}}
					{{penalties}}
				</div>
			</div>
			<div class="stats-section" id="auto-section" style="display: none;"></div>
			<div class="stats-section" id="teleop-section" style="display: none;"></div>
		</div>
	</div>
	<div class="cont col">
		<h2>Competitions</h2>
		{{comp-checkboxes}}
	</div>
</div>
<style>
	.number {
		font-family: "Courier New", Courier, monospace;
	}

	.stats-tab {
		background-color: var(--bg2);
		padding: 0.9rem;
	}

	.stats-grid {
		display: grid;
		grid-template-columns: repeat(3, minmax(0, 1fr));
	}

	.card {
		background-color: var(--bg2);
		padding: 1.0rem;
		margin: 0.4rem;
		padding-left: 1.5rem;
		padding-right: 1.5rem;
	}

	.card-stat {
		font-size: calc(2.5vw * var(--scale));
	}

	.card-title {
		color: var(--fg3);
	}
</style>
<script>
	function compCb(e) {
		let comp = e.target.dataset.val;
		fetch(`/api/update_team_competition/{{number}}?competition=${comp}`, {
			method: "POST",
		}).then((resp) => {
			if (resp.status != 200) {
				setError(resp.statusText);
				e.target.checked = !e.target.checked;
			}
		});
	}

	for (let elem of document.getElementsByClassName("comp-cb")) {
		let cb = elem.firstChild;
		cb.addEventListener("change", compCb);
	}
</script>
{{footer}}
