{{worbots-header}}{{error}}
<div class="cont col" id="team-details">
	<h1>{{name}}</h1>
	<h3 class="details-subtitle number">{{number}}</h3>
	<div class="cont">
		<button onclick="history.back()">Back</button>
	</div>
	<div class="cont">
		<div class="cont">
			<img src="/assets/icons/clock.svg" class="details-icon" />
			{{rookie-year}}
		</div>
	</div>
	<div class="cont col">
		<h2>Competitions</h2>
		{{comp-checkboxes}}
	</div>
</div>
<style>
	.number {
		font-family: "Courier New", Courier, monospace;
	}
</style>
<script>
	function compCb(e) {
		let comp = e.target.dataset.val;
		fetch(`/api/update_team_competition/{{number}}?competition=${comp}`, {
			method: "POST",
		}).then((resp) => {
			if (resp.status != 200) {
				setError(resp.statusText);
				e.target.checked = !e.target.checked;
			}
		});
	}

	for (let elem of document.getElementsByClassName("comp-cb")) {
		let cb = elem.firstChild;
		cb.addEventListener("change", compCb);
	}
</script>
{{footer}}
