{{worbots-header}}{{error}}
<div class="cont col">
	<h1>Create Auto</h1>
	<h3 class="details-subtitle">{{team-number}}</h3>
	<button onclick="history.back()">Back</button>
	<br />
	<form id="auto-form" class="cont col">
		<input type="text" name="name" id="name-field" class="field" placeholder="Enter auto name..." />
		<label for="fuel">Fuel</label>
		<input type="number" class="field" name="fuel" id="fuel" />

		<input type="submit" id="submit" value="Save" />
	</form>
</div>
<script>
	function onSubmit(event) {
		event.preventDefault();

		const name = encodeURIComponent(document.getElementById("name-field").value);
		const fuel = document.getElementById("fuel").value * 1;

		if (name == "") {
			setError("Name field cannot be empty");
			return;
		}

		let requestBody = `name=${name}&team={{team-number}}&fuel=${fuel}&starting_position=0.0`;

		fetch("/api/create_auto", {
			method: "POST",
			body: requestBody,
			headers: { "Content-Type": "application/x-www-form-urlencoded" },
		}).then((response) => {
			if (response.status != 200) {
				setError("Failed to create auto: " + response.statusText);
				return;
			}
			window.location.href = "/scouting/team/{{team-number}}/autos";
		});
	}

	document.getElementById("auto-form").addEventListener("submit", onSubmit);
</script>
<style>
	.field {
		width: 60%;
	}
</style>
{{footer}}
