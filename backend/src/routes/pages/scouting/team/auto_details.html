{{worbots-header}}{{error}}
<div class="cont col" id="auto-details">
	<h1>{{name}}</h1>
	<div class="cont">
		<button onclick="history.back()">Back</button>
		<div class="cont">
			<img src="/assets/icons/coral.svg" class="details-icon" style="width:0.75rem" />
			{{coral}}
		</div>
		<div class="cont">
			<img src="/assets/icons/algae.svg" class="details-icon" />
			{{algae}}
		</div>
	</div>
	<h2>Stats</h2>
	<div class="cont col" id="stats">
		<div class="cont" id="stats-body">
			<div class="stats-grid">
				{{point-value}}
				{{average-coral}}
				{{average-algae}}
				{{coral-accuracy}}
				{{algae-accuracy}}
				{{agitates}}
				{{usage-rate}}
			</div>
		</div>
	</div>
</div>
<style>
	.stats-grid {
		display: grid;
		grid-template-columns: repeat(3, minmax(0, 1fr));
	}

	.card {
		background-color: var(--bg2);
		padding: 1.0rem 1.3rem;
		margin: 0.4rem;
	}

	.card-stat {
		font-size: calc(2.5vw * var(--scale));
	}

	.card-title {
		color: var(--fg3);
		text-align: center;
	}

	.card-stat.strong {
		font-weight: bold;
	}

	h3 {
		margin-bottom: 0.4rem;
	}
</style>
{{footer}}
