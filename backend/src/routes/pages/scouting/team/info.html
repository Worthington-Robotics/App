{{worbots-header}}{{error}}
<h1>Team Info</h1>
<form id="team-info-form" class="cont col">
	<button onclick="history.back()">Back</button>
	<h2>Basic Stats</h2>
	<label for="max-speed">Max Speed</label>
	<div class="cont">
		<input type="number" name="max-speed" id="max-speed" class="field" placeholder="0.00ft/s" step=any
			value="{{max-speed}}" />
		<button id="max-speed-convert">m/s</button>
	</div>
	<label for="height">Height</label>
	<div class="cont">
		<input type="number" name="height" id="height" class="field" placeholder="0.00in" step=any value="{{height}}" />
		<button id="height-convert-m">m</button>
		<button id="height-convert-ft">ft</button>
	</div>
	<label for="weight">Weight</label>
	<div class="cont">
		<input type="number" name="weight" id="weight" class="field" placeholder="0.00lb" step=any value="{{weight}}" />
		<button id="weight-convert">kg</button>
	</div>
	<label for="length">Length</label>
	<div class="cont">
		<input type="number" name="length" id="length" class="field" placeholder="0.00in" step=any value="{{length}}" />
		<button id="length-convert-m">m</button>
		<button id="length-convert-ft">ft</button>
	</div>
	<label for="width">Width</label>
	<div class="cont">
		<input type="number" name="width" id="width" class="field" placeholder="0.00in" step=any value="{{width}}" />
		<button id="width-convert-m">m</button>
		<button id="width-convert-ft">ft</button>
	</div>
	<label for="drivetrain-type">Drivetrain Type</label>
	<select name="drivetrain-type" id="drivetrain-type" class="field">
		<option value="none">Unknown</option>
		<option value="swerve" {{swerve-selected}}>Swerve</option>
		<option value="tank" {{tank-selected}}>Tank</option>
		<option value="mecanum" {{mecanum-selected}}>Mecanum</option>
		<option value="other" {{drive-other-selected}}>Other</option>
	</select>
	<label for="intake-type">Intake Type</label>
	<select name="intake-type" id="intake-type" class="field">
		<option value="none">Unknown</option>
		<option value="under_bumper" {{under-the-bumper-selected}}>Under the Bumper</option>
		<option value="over_bumper" {{over-the-bumper-selected}}>Over the Bumper</option>
	</select>
	<h2>Capabilities</h2>
	<div class="cont">
		<input type="checkbox" class="field" name="can-pass-trench" id="can-pass-trench" {{can-pass-trench-checked}} />
		<label for="can-pass-trench">Can Drive Under Trench?</label>
	</div>
	<div class="cont">
		<input type="checkbox" class="field" name="can-pass-bump" id="can-pass-bump" {{can-pass-bump-checked}} />
		<label for="can-pass-bump">Can Drive Over Bump?</label>
	</div>
	<div class="cont">
		<input type="checkbox" class="field" name="can-ground-intake" id="can-ground-intake"
			{{can-ground-intake-checked}} />
		<label for="can-ground-intake">Can Ground Intake?</label>
	</div>
	<div class="cont">
		<input type="checkbox" class="field" name="can-station-intake" id="can-station-intake"
			{{can-station-intake-checked}} />
		<label for="can-station-intake">Can Station Intake?</label>
	</div>
	<div class="cont">
		<input type="checkbox" class="field" name="can-score-close" id="can-score-close" {{can-score-close-checked}} />
		<label for="can-score-close">Can Score Close?</label>
	</div>
	<div class="cont">
		<input type="checkbox" class="field" name="can-score-far" id="can-score-far" {{can-score-far-checked}} />
		<label for="can-score-far">Can Score Far?</label>
	</div>

	<h2>Teleop</h2>
	<label for="fuel-storage">Fuel Storage</label>
	<input type="number" class="field" name="fuel-storage" id="fuel-storage" value="{{fuel-storage}}" />
	<label for="fuel-per-shift">Fuel Per Shift</label>
	<input type="number" class="field" name="fuel-per-shift" id="fuel-per-shift" value="{{fuel-per-shift}}" />
	<label for="cycle-time">Cycle Time</label>
	<div class="cont">
		<input type="number" name="cycle-time" id="cycle-time" class="field" placeholder="0.00" step=any
			value="{{cycle-time}}" />
		<button id="cycle-time-convert">CPM</button>
	</div>
	<label for="climb-ability">Climb Ability</label>
	<select name="climb-ability" id="climb-ability" class="field">
		<option value="none">Unknown</option>
		<option value="no-climb" {{no-climb-selected}}>None</option>
		<option value="l1" {{l1-selected}}>L1</option>
		<option value="l2" {{l2-selected}}>L2</option>
		<option value="l3" {{l3-selected}}>L3</option>
	</select>
	<label for="cycle-time">Climb Time</label>
	<input type="number" name="climb-time" id="climb-time" class="field" placeholder="0.00" step=any
		value="{{cycle-time}}" />
	<div class="cont">
		<input type="checkbox" class="field" name="align-score" id="align-score" {{align-score-checked}} />
		<label for="align-score">Can Score Align?</label>
	</div>
	<div class="cont">
		<input type="checkbox" class="field" name="align-intake" id="align-intake" {{align-intake-checked}} />
		<label for="align-intake">Can Intake Align?</label>
	</div>

	<h2>Auto</h2>
	<label for="auto-fuel">Auto Fuel</label>
	<input type="number" class="field" name="auto-fuel" id="auto-fuel" value="{{auto-fuel}}" />
	<label for="can-climb-auto">Can Climb in Auto?</label>
	<input type="checkbox" class="field" name="can-climb-auto" id="can-climb-auto" {{can-climb-auto-checked}} />

	<h2>Other</h2>
	<label for="uses-pathplanner">Uses PathPlanner?</label>
	<input type="checkbox" class="field" name="uses-pathplanner" id="uses-pathplanner" {{uses-pathplanner-checked}} />
	<label for="two-can-networks">Has Two CAN Networks?</label>
	<input type="checkbox" class="field" name="two-can-networks" id="two-can-networks" {{two-can-networks-checked}} />
	<label for="progress">Scouting Progress</label>
	<select name="progress" id="progress" class="field">
		<option value="not_done">Not Done</option>
		<option value="needs_refresh" {{needs-refresh-selected}}>Needs Refresh</option>
		<option value="finished" {{finished-selected}}>Done</option>
	</select>
	<label for="notes">Additional Notes</label>
	<textarea name="notes" id="notes" class="round border">{{notes}}</textarea>

	<input type="submit" id="submit" value="Save" />
</form>
<script>
	function onSubmit(event) {
		event.preventDefault();

		let drivetrainType = document.getElementById("drivetrain-type").value;
		if (drivetrainType == "none") {
			drivetrainType = null;
		}

		let intakeType = document.getElementById("intake-type").value;
		if (intakeType == "none") {
			intakeType = null;
		}

		let climbAbility = document.getElementById("climb-ability").value;
		if (climbAbility == "none") {
			climbAbility = null;
		}

		// We do lots of conversions to numbers with * 1 here
		const data = {
			team: "{{team-number}}" * 1,
			max_speed: document.getElementById("max-speed").value.replace("ft/s", "") * 1,
			height: document.getElementById("height").value.replace("in", "") * 1,
			weight: document.getElementById("weight").value.replace("kg", "") * 1,
			length: document.getElementById("length").value.replace("in", "") * 1,
			width: document.getElementById("width").value.replace("in", "") * 1,
			drivetrain_type: drivetrainType,
			intake_type: intakeType,
			can_pass_trench: document.getElementById("can-pass-trench").checked,
			can_pass_bump: document.getElementById("can-pass-bump").checked,
			can_ground_intake: document.getElementById("can-ground-intake").checked,
			can_station_intake: document.getElementById("can-station-intake").checked,
			can_score_close: document.getElementById("can-score-close").checked,
			can_score_far: document.getElementById("can-score-far").checked,
			fuel_storage: document.getElementById("fuel-storage").value * 1,
			cycle_time: document.getElementById("cycle-time").value * 1,
			climb_ability: climbAbility,
			climb_time: document.getElementById("climb-time").value * 1,
			align_score: document.getElementById("align-score").checked,
			align_intake: document.getElementById("align-intake").checked,
			auto_fuel: document.getElementById("auto-fuel").value * 1,
			can_climb_auto: document.getElementById("can-climb-auto").checked,
			uses_pathplanner: document.getElementById("uses-pathplanner").checked,
			two_can_networks: document.getElementById("two-can-networks").checked,
			progress: document.getElementById("progress").value,
			notes: document.getElementById("notes").value,
		};
		const dataReady = encodeURIComponent(JSON.stringify(data));

		fetch("/api/create_team_info", {
			method: "POST",
			body: `team={{team-number}}&data=${dataReady}`,
			headers: { "Content-Type": "application/x-www-form-urlencoded" },
		}).then((response) => {
			if (response.status != 200) {
				setError("Failed to update team info: " + response.statusText);
				return;
			}
			window.location.href = "/scouting/team/{{team-number}}";
		});
	}

	document.getElementById("team-info-form").addEventListener("submit", onSubmit);

	// Unit conversion buttons
	document.getElementById("max-speed-convert").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("max-speed");
		elem.value = elem.value * 3.281;
	});
	document.getElementById("height-convert-m").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("height");
		elem.value = elem.value * 3.281;
	});
	document.getElementById("height-convert-ft").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("height");
		elem.value = elem.value * 12;
	});
	document.getElementById("weight-convert").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("weight");
		elem.value = elem.value * 2.205;
	});
	document.getElementById("length-convert-m").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("length");
		elem.value = elem.value * 3.281;
	});
	document.getElementById("length-convert-ft").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("length");
		elem.value = elem.value * 12;
	});
	document.getElementById("width-convert-m").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("width");
		elem.value = elem.value * 3.281;
	});
	document.getElementById("width-convert-ft").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("width");
		elem.value = elem.value * 12;
	});
	document.getElementById("cycle-time-convert").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("cycle-time");
		elem.value = 120.0 / elem.value;
	});
</script>
<style>
	.info-field {
		width: 60%;
	}

	textarea {
		resize: none;
		width: 85%;
		height: 12rem;
	}
</style>
{{footer}}
