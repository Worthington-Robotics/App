{{worbots-header}}{{error}}
<h1>Team Info</h1>
<form id="team-info-form" class="cont col">
	<button onclick="history.back()">Back</button>
	<h2>Basic Stats</h2>
	<label for="max-speed">Max Speed</label>
	<div class="cont">
		<input type="number" name="max-speed" id="max-speed" class="field" placeholder="0.00ft/s" step=any
			value="{{max-speed}}" />
		<button id="max-speed-convert">m/s</button>
	</div>
	<label for="height">Height</label>
	<div class="cont">
		<input type="number" name="height" id="height" class="field" placeholder="0.00in" step=any value="{{height}}" />
		<button id="height-convert-m">m</button>
		<button id="height-convert-ft">ft</button>
	</div>
	<label for="weight">Weight</label>
	<div class="cont">
		<input type="number" name="weight" id="weight" class="field" placeholder="0.00lb" step=any value="{{weight}}" />
		<button id="weight-convert">kg</button>
	</div>
	<label for="length">Length</label>
	<div class="cont">
		<input type="number" name="length" id="length" class="field" placeholder="0.00in" step=any value="{{length}}" />
		<button id="length-convert-m">m</button>
		<button id="length-convert-ft">ft</button>
	</div>
	<label for="width">Width</label>
	<div class="cont">
		<input type="number" name="width" id="width" class="field" placeholder="0.00in" step=any value="{{width}}" />
		<button id="width-convert-m">m</button>
		<button id="width-convert-ft">ft</button>
	</div>
	<label for="drivetrain-type">Drivetrain Type</label>
	<select name="drivetrain-type" id="drivetrain-type" class="field">
		<option value="none">Unknown</option>
		<option value="swerve" {{swerve-selected}}>Swerve</option>
		<option value="tank" {{tank-selected}}>Tank</option>
		<option value="mecanum" {{mecanum-selected}}>Mecanum</option>
		<option value="other" {{drive-other-selected}}>Other</option>
	</select>
	<h2>Capabilities</h2>
	<label for="can-pickup-algae">Can Pickup Algae?</label>
	<input type="checkbox" class="field" name="can-pickup-algae" id="can-pickup-algae" {{can-pickup-algae-checked}} />
	<label for="can-pickup-coral">Can Pickup Coral?</label>
	<input type="checkbox" class="field" name="can-pickup-coral" id="can-pickup-coral" {{can-pickup-coral-checked}} />
	<label for="can-hold-both">Can Hold Both at Once?</label>
	<input type="checkbox" class="field" name="can-hold-both" id="can-hold-both" {{can-hold-both-checked}} />
	<label for="can-ground-intake-coral">Can Ground Intake Coral?</label>
	<input type="checkbox" class="field" name="can-ground-intake-coral" id="can-ground-intake-coral"
		{{can-ground-intake-coral-checked}} />
	<label for="can-ground-intake-algae">Can Ground Intake Algae?</label>
	<input type="checkbox" class="field" name="can-ground-intake-algae" id="can-ground-intake-algae"
		{{can-ground-intake-algae-checked}} />
	<label for="can-slide-intake">Can Slide Intake?</label>
	<input type="checkbox" class="field" name="can-slide-intake" id="can-slide-intake" {{can-slide-intake-checked}} />
	<label for="can-reef">Can Score on Reef?</label>
	<input type="checkbox" class="field" name="can-reef" id="can-reef" {{can-reef-checked}} />
	<label for="can-processor">Can Score in Processor?</label>
	<input type="checkbox" class="field" name="can-processor" id="can-processor" {{can-processor-checked}} />
	<label for="can-net">Can Score in Net?</label>
	<input type="checkbox" class="field" name="can-net" id="can-net" {{can-net-checked}} />
	<label for="can-agitate">Can Agitate Algae?</label>
	<input type="checkbox" class="field" name="can-agitate" id="can-agitate" {{can-agitate-checked}} />

	<label for="">Reef Levels</label>
	<div class="cont">
		L1
		<input type="checkbox" class="field" name="can-l1" id="can-l1" {{can-l1-checked}} />
		<input type="checkbox" class="field" name="can-l2" id="can-l2" {{can-l2-checked}} />
		<input type="checkbox" class="field" name="can-l3" id="can-l3" {{can-l3-checked}} />
		<input type="checkbox" class="field" name="can-l4" id="can-l4" {{can-l4-checked}} />
		L4
	</div>

	<label for="can-shallow">Can Climb Shallow?</label>
	<input type="checkbox" class="field" name="can-shallow" id="can-shallow" {{can-shallow-checked}} />
	<label for="can-deep">Can Climb Deep?</label>
	<input type="checkbox" class="field" name="can-deep" id="can-deep" {{can-deep-checked}} />
	<label for="preferred-piece">Preferred Game Piece</label>
	<select name="preferred-piece" id="preferred-piece" class="field">
		<option value="unknown">Unknown</option>
		<option value="coral" {{piece-coral-selected}}>Coral</option>
		<option value="algae" {{piece-algae-selected}}>Algae</option>
	</select>
	<h2>Teleop</h2>
	<label for="cycle-time">Cycle Time</label>
	<div class="cont">
		<input type="number" name="cycle-time" id="cycle-time" class="field" placeholder="0.00" step=any
			value="{{cycle-time}}" />
		<button id="cycle-time-convert">CPM</button>
	</div>
	<label for="cycle-time">Climb Time</label>
	<input type="number" name="climb-time" id="climb-time" class="field" placeholder="0.00" step=any
		value="{{cycle-time}}" />
	<label for="align-score">Can Score Align?</label>
	<input type="checkbox" class="field" name="align-score" id="align-score" {{align-score-checked}} />
	<label for="align-intake">Can Intake Align?</label>
	<input type="checkbox" class="field" name="align-intake" id="align-intake" {{align-intake-checked}} />
	<h2>Auto</h2>
	<label for="auto-crosses-line">Crosses Line?</label>
	<input type="checkbox" class="field" name="auto-crosses-line" id="auto-crosses-line" {{auto-crosses-line-checked}} />
	<label for="auto-scores-front">Scores on Front of Reef?</label>
	<input type="checkbox" class="field" name="auto-scores-front" id="auto-scores-front" {{auto-scores-front-checked}} />
	<label for="auto-scores-back">Scores on Back of Reef?</label>
	<input type="checkbox" class="field" name="auto-scores-back" id="auto-scores-back" {{auto-scores-back-checked}} />
	<label for="auto-scores-side">Scores on Side of Reef?</label>
	<input type="checkbox" class="field" name="auto-scores-side" id="auto-scores-side" {{auto-scores-side-checked}} />
	<label for="auto-algae">Average Algae Scored</label>
	<input type="number" name="auto-algae" id="auto-algae" class="field" placeholder="0" step=any
		value="{{auto-algae}}" />
	<label for="auto-coral">Average Coral Scored</label>
	<input type="number" name="auto-coral" id="auto-coral" class="field" placeholder="0" step=any
		value="{{auto-coral}}" />
	<h2>Other</h2>
	<label for="uses-pathplanner">Uses PathPlanner?</label>
	<input type="checkbox" class="field" name="uses-pathplanner" id="uses-pathplanner" {{uses-pathplanner-checked}} />
	<label for="two-can-networks">Has Two CAN Networks?</label>
	<input type="checkbox" class="field" name="two-can-networks" id="two-can-networks" {{two-can-networks-checked}} />
	<label for="progress">Scouting Progress</label>
	<select name="progress" id="progress" class="field">
		<option value="not_done">Not Done</option>
		<option value="needs_refresh" {{needs-refresh-selected}}>Needs Refresh</option>
		<option value="finished" {{finished-selected}}>Done</option>
	</select>
	<label for="notes">Additional Notes</label>
	<textarea name="notes" id="notes" class="round border">{{notes}}</textarea>

	<input type="submit" id="submit" value="Save" />
</form>
<script>
	function onSubmit(event) {
		event.preventDefault();

		let drivetrainType = document.getElementById("drivetrain-type").value;
		if (drivetrainType == "none") {
			drivetrainType = null;
		}

		let preferredPiece = document.getElementById("preferred-piece").value;
		if (preferredPiece == "unknown") {
			preferredPiece = null;
		}

		// We do lots of conversions to numbers with * 1 here
		const data = {
			team: "{{team-number}}",
			max_speed: document.getElementById("max-speed").value.replace("ft/s", "") * 1,
			height: document.getElementById("height").value.replace("in", "") * 1,
			weight: document.getElementById("weight").value.replace("kg", "") * 1,
			length: document.getElementById("length").value.replace("in", "") * 1,
			width: document.getElementById("width").value.replace("in", "") * 1,
			drivetrain_type: drivetrainType,
			can_pickup_algae: document.getElementById("can-pickup-algae").checked,
			can_pickup_coral: document.getElementById("can-pickup-coral").checked,
			can_hold_both: document.getElementById("can-hold-both").checked,
			can_ground_intake_algae: document.getElementById("can-ground-intake-algae").checked,
			can_ground_intake_coral: document.getElementById("can-ground-intake-coral").checked,
			can_slide_intake: document.getElementById("can-slide-intake").checked,
			can_reef: document.getElementById("can-reef").checked,
			can_processor: document.getElementById("can-processor").checked,
			can_net: document.getElementById("can-net").checked,
			can_agitate: document.getElementById("can-agitate").checked,
			can_l1: document.getElementById("can-l1").checked,
			can_l2: document.getElementById("can-l2").checked,
			can_l3: document.getElementById("can-l3").checked,
			can_l4: document.getElementById("can-l4").checked,
			can_shallow: document.getElementById("can-shallow").checked,
			can_deep: document.getElementById("can-deep").checked,
			preferred_piece: preferredPiece,
			cycle_time: document.getElementById("cycle-time").value * 1,
			climb_time: document.getElementById("climb-time").value * 1,
			align_score: document.getElementById("align-score").checked,
			align_intake: document.getElementById("align-intake").checked,
			auto_crosses_line: document.getElementById("auto-crosses-line").checked,
			auto_scores_front: document.getElementById("auto-scores-front").checked,
			auto_scores_back: document.getElementById("auto-scores-back").checked,
			auto_scores_side: document.getElementById("auto-scores-side").checked,
			auto_algae: document.getElementById("auto-algae").value * 1,
			auto_coral: document.getElementById("auto-coral").value * 1,
			uses_pathplanner: document.getElementById("uses-pathplanner").checked,
			two_can_networks: document.getElementById("two-can-networks").checked,
			progress: document.getElementById("progress").value,
			notes: document.getElementById("notes").value,
		};
		const dataReady = encodeURIComponent(JSON.stringify(data));

		fetch("/api/create_team_info", {
			method: "POST",
			body: `team={{team-number}}&data=${dataReady}`,
			headers: { "Content-Type": "application/x-www-form-urlencoded" },
		}).then((response) => {
			if (response.status != 200) {
				setError("Failed to update team info: " + response.statusText);
				return;
			}
			window.location.href = "/scouting/team/{{team-number}}";
		});
	}

	document.getElementById("team-info-form").addEventListener("submit", onSubmit);

	// Unit conversion buttons
	document.getElementById("max-speed-convert").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("max-speed");
		elem.value = elem.value * 3.281;
	});
	document.getElementById("height-convert-m").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("height");
		elem.value = elem.value * 3.281;
	});
	document.getElementById("height-convert-ft").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("height");
		elem.value = elem.value * 12;
	});
	document.getElementById("weight-convert").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("weight");
		elem.value = elem.value * 2.205;
	});
	document.getElementById("length-convert-m").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("length");
		elem.value = elem.value * 3.281;
	});
	document.getElementById("length-convert-ft").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("length");
		elem.value = elem.value * 12;
	});
	document.getElementById("width-convert-m").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("width");
		elem.value = elem.value * 3.281;
	});
	document.getElementById("width-convert-ft").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("width");
		elem.value = elem.value * 12;
	});
	document.getElementById("cycle-time-convert").addEventListener("click", (e) => {
		e.preventDefault();
		let elem = document.getElementById("cycle-time");
		elem.value = 120.0 / elem.value;
	});
</script>
<style>
	.info-field {
		width: 60%;
	}

	textarea {
		resize: none;
		width: 85%;
		height: 12rem;
	}
</style>
{{footer}}
