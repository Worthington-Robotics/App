{{worbots-header}}{{error}}{{prompt}}
<h1>My Scouting</h1>
<div id="my-scouting" class="cont col">
	<div class="cont col" style="width:70%">
		<h3>{{completed-matches}}/15 Complete</h3>
		<div class="round progress-bar-cont">
			<div class="round progress-bar" style="width:{{progress-width}}%"></div>
		</div>
	</div>
	<div class="cont col">
		<h3>Scout a Match</h3>
		<div id="scout-buttons">
			<a href="/scouting/report" class="nolink"><button class="cont"><img src="/assets/icons/edit.svg"
						style="width:1.1rem" /> Scouting
					Report</button></a>
			<button id="scouting-upload" class="cont"><img src="/assets/icons/upload.svg" style="width:1.2rem" />
				Upload Match</button>
			<a href="/scouting/report.html" target="_blank" class="nolink"><button class="cont"
					style="background-color: var(--bg2);"><img src="/assets/icons/download.svg" style="width:1.1rem" /> Download
					Form</button></a>
			<!-- <a href="/scouting/report/raw"><button style="background-color: var(--bg2);">Fallback</button></a> -->
		</div>
	</div>
	<div class="cont col">
		<h3>Matches</h3>
		<div id="filter" class="cont">
			<button id="claimed-filter">Claimed</button>
			<button id="available-filter" style="background-color: var(--bg2);">Available</button>
		</div>
		<div class="cont col">
			{{matches}}
		</div>
	</div>
	<div id="popup-container" class="cont" style="display:none">
		<div id="popup" class="cont col round">
			<h4 id="popup-number"></h4>
			<div class="cont">
				<div id="popup-team-description">Scouting team</div>
				<a class="cont round nolink team" id="popup-team"></a>
			</div>
			<div class="cont">
				<button id="popup-claim">Claim</button>
				<a id="popup-scout-link"><button id="popup-scout">Scout Match</button></a>
				<button id="popup-cancel">Close</button>
			</div>
		</div>
	</div>
	<div class="cont col">
		<h3>My Prescouting Teams</h3>
		<div id="teams-cont">
			{{teams}}
		</div>
	</div>
</div>
<style>
	#teams-cont {
		display: grid;
		grid-template-columns: repeat(4, minmax(0, 1fr));
	}

	.team {
		border: 0.2rem solid var(--fg2);
		width: 2rem;
		height: 1rem;
		padding: 0.4rem;
		margin: 0.4rem;
	}

	.match {
		width: 90%;
		padding: 1rem;
		background-color: var(--bg2);
		cursor: pointer;
	}

	.match-inner {
		display: grid;
		grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(0, 2fr) minmax(0, 1fr) minmax(0, 1fr);
		width: 100%;
		pointer-events: none;
	}

	.match-number {
		font-size: calc(1.7vw * var(--scale));
	}

	.match-time {
		color: var(--fg2);
		text-align: center;
	}

	.match-claims {
		display: grid;
		grid-template-columns: repeat(3, minmax(0, 1fr));
		gap: 0.2rem;
	}

	.claim {
		width: 0.65rem;
		height: 0.65rem;
		border-radius: 50%;
		background-color: var(--bg4);
	}

	.claim.r {
		background-color: var(--wbred);
	}

	.claim.b {
		background-color: var(--wbblueacc);
	}

	/* Start with these hidden */
	.available {
		display: none;
	}

	#popup-container {
		position: fixed;
		left: 0;
		top: 0;
		width: 100vw;
		height: 100vh;
		z-index: 100;
		background-color: rgba(0, 0, 0, 0.5);
	}

	#popup {
		background-color: var(--bg2);
		padding: 1.5rem;
		width: 80%;
	}

	#popup-cancel {
		background-color: var(--bg3);
	}

	#popup-team {
		margin-left: -0.5rem;
	}

	.progress-bar-cont {
		width: 90%;
		background-color: var(--bg2);
	}

	.progress-bar {
		height: 1rem;
		background-color: var(--wbblue);
	}

	#scout-buttons {
		display: grid;
		grid-template-columns: repeat(2, minmax(0, 1fr));
		gap: 0.5rem;
	}
</style>
<script>
	// Filter logic
	let claimedButton = document.getElementById("claimed-filter");
	let availableButton = document.getElementById("available-filter");
	let claimed = document.getElementsByClassName("claimed");
	let available = document.getElementsByClassName("available");
	claimedButton.addEventListener("click", () => {
		claimedButton.style.backgroundColor = "";
		availableButton.style.backgroundColor = "var(--bg2)";
		for (let e of available) {
			e.style.display = "none";
		}
		for (let e of claimed) {
			e.style.display = "flex";
		}
	});
	availableButton.addEventListener("click", () => {
		availableButton.style.backgroundColor = "";
		claimedButton.style.backgroundColor = "var(--bg2)";
		for (let e of claimed) {
			e.style.display = "none";
		}
		for (let e of available) {
			e.style.display = "flex";
		}
	});

	// Interaction logic with matches
	let popupContainer = document.getElementById("popup-container");
	let popupClaimButton = document.getElementById("popup-claim");
	let popupTeam = document.getElementById("popup-team");
	let popupTeamDescription = document.getElementById("popup-team-description");

	let selectedMatch = null;
	let selectedMatchIsClaimed = null;
	let selectedMatchElement = null;
	let selectedMatchTeam = null;

	function clickMatch(e) {
		selectedMatchIsClaimed = e.target.classList.contains("claimed");
		selectedMatch = e.target.dataset.num;
		selectedMatchElement = e.target;
		if (e.target.dataset.team == "") {
			selectedMatchTeam = null;
		} else {
			selectedMatchTeam = e.target.dataset.team;
		}

		document.getElementById("popup-number").innerHTML = `Qualification ${selectedMatch}`;
		if (selectedMatchTeam == null) {
			popupTeam.href = "";
			popupTeam.style.display = "none";
			popupTeamDescription.style.display = "none";
		} else {
			popupTeam.innerHTML = selectedMatchTeam;
			popupTeam.href = `/scouting/team/${selectedMatchTeam}`;
			popupTeam.style.display = "";
			popupTeamDescription.style.display = "";
		}
		if (selectedMatchIsClaimed) {
			popupClaimButton.innerHTML = "Unclaim";
		} else {
			popupClaimButton.innerHTML = "Claim";
		}

		scoutURL = `/scouting/report?match_number=Q${selectedMatch}&competition=current`;
		if (selectedMatchIsClaimed) {
			scoutURL += `&team_number=${selectedMatchTeam}`;
		}
		document.getElementById("popup-scout-link").href = scoutURL;

		popupContainer.style.display = "";
	}

	for (let e of document.getElementsByClassName("match")) {
		e.addEventListener("click", clickMatch);
	}

	function closePopup() {
		popupContainer.style.display = "none";
		selectedMatch = null;
		selectedMatchIsClaimed = null;
	}

	document.getElementById("popup-cancel").addEventListener("click", () => {
		closePopup();
	});

	popupClaimButton.addEventListener("click", () => {
		if (selectedMatch == null) {
			closePopup();
			return;
		}

		let method = "";
		if (selectedMatchIsClaimed) {
			method = `/api/unclaim_match/${selectedMatch}`;
		} else {
			method = `/api/claim_best/${selectedMatch}`;
		}

		fetch(method, {
			method: "POST",
		}).then((resp) => {
			if (resp.status == 200) {
				// Swap the class of the element
				if (selectedMatchIsClaimed) {
					selectedMatchElement.classList.remove("claimed");
					selectedMatchElement.classList.add("available");
				} else {
					selectedMatchElement.classList.add("claimed");
					selectedMatchElement.classList.remove("available");
				}
				// No matter whether we are claiming or unclaiming, the match is moving to the other filter so we won't be able to see it
				selectedMatchElement.style.display = "none";
				closePopup();
			} else {
				setError(resp.statusText);
			}
		});
	});

	document.getElementById("scouting-upload").addEventListener("click", () => {
		let input = document.createElement('input');
		input.type = 'file';
		input.addEventListener("change", (e) => {
			let file = e.target.files[0];

			let reader = new FileReader();
			reader.readAsText(file, 'UTF-8');

			reader.addEventListener("load", (e) => {
				let content = e.target.result;
				console.log(content);

				fetch("/api/post_match_stats", {
					method: "POST",
					body: `data=${content}`,
					headers: { "Content-Type": "application/x-www-form-urlencoded" },
				}).then((response) => {
					if (response.status != 200) {
						setError("Failed to post match results: " + response.statusText);
						return;
					} else {
						setSuccess("Match Uploaded");
					}
				});
			});
		});
		input.click();
	});
</script>
{{footer}}
