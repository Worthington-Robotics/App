{{worbots-header}}
<script src="/assets/sortable.min.js"></script>
<h1>Teams</h1>
<div id="teams" class="cont col">
	<input type="search" id="search" placeholder="Search for teams..." />
	<br />
	<table id="teams-cont" class="round" data-sortable>
		<thead>
			<tr>
				<th class="n">#</th>
				<th>Name</th>
			</tr>
		</thead>
		<tbody id="teams-cont-body">
			{{teams}}
		</tbody>
	</table>
</div>
<style>
	#teams-cont {
		width: 90%;
		overflow-x: scroll;
	}

	.n {
		font-family: "Courier New", Courier, monospace;
		color: var(--fg2);
		font-weight: bold;
		text-align: center;
	}

	.N {
		font-weight: bold;
	}
</style>
<script>
	Sortable.initTable(document.getElementById("teams-cont"));

	// Hydrate the rows
	let rows = document
		.getElementById("teams-cont-body")
		.getElementsByTagName("tr");
	for (let row of rows) {
		let cols = row.getElementsByTagName("td");
		let num = cols[0].innerText;
		let name = cols[1];
		name.dataset.value = name.innerText;
		name.innerHTML = `<a href="/scouting/team/${num}">${name.innerText}</a>`;
		name.firstChild.classList.add("nolink");
	}

	document.getElementById("search").addEventListener("keyup", (e) => {
		let search = e.target.value.toUpperCase();
		let rows = document
			.getElementById("teams-cont-body")
			.getElementsByTagName("tr");
		for (let row of rows) {
			let cols = row.getElementsByTagName("td");
			let num = cols[0].innerText;
			let name = cols[1].innerText;
			if (
				name.toUpperCase().indexOf(search) > -1 ||
				num.toUpperCase().indexOf(search) > -1
			) {
				row.style.display = "";
			} else {
				row.style.display = "none";
			}
		}
	});
</script>
{{footer}}
