{{worbots-header}}
<h1>Login</h1>
<form id="login-form" class="cont make-col">
	<input type="text" name="id" id="id-field" placeholder="Enter Username..." />
	<input type="password" name="password" id="password-field" placeholder="Enter Password..." />
	<input type="submit" id="submit" value="Submit" />
</form>
<script>
	function onSubmit(event) {
		event.preventDefault();

		console.log("Submitting...");
		const id = document.getElementById("id-field").value;
		const password = document.getElementById("password-field").value;
		fetch("/api/auth", {
			method: "POST",
			body: `id=${id}&password=${password}`,
			headers: { "Content-Type": "application/x-www-form-urlencoded" },
		}).then((response) => {
			response.text().then((session_id) => {
				const lifetimeDays = 7;
				const date = new Date();
				date.setTime(date.getTime() + lifetimeDays * 24 * 60 * 60 * 1000);
				let expires = "expires=" + date.toUTCString();
				document.cookie = `session_id=${session_id};${expires};SameSite=Lax;path=/`;
				window.location.href = "/";
			});
		});
	}

	document.getElementById("login-form").addEventListener("submit", onSubmit);
</script>
