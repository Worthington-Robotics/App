{{worbots-header}}
<h1>Events</h1>
<div id="calendar" class="container make-col">
	<div id="events-container" class="container">{{events}}</div>
	{{add-event}}
</div>
<style>
	#calendar {
		width: 100%;
		row-gap: 1rem;
	}

	#events-container {
		flex-direction: column;
		row-gap: 0.5rem;
	}

	.event {
		padding: 1.4rem;
		background-color: var(--bg2);
		flex-direction: column;
		width: 90%;
		box-sizing: border-box;
	}

	.event-date {
		font-size: calc(1.3vw * var(--scale));
		color: var(--fg2);
	}

	.event-subtext {
		font-size: calc(1.2vw * var(--scale));
		color: var(--fg3);
	}
</style>
{{footer}}
