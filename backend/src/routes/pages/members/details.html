{{worbots-header}}{{error}}
<div class="cont col" id="member-details">
	<h1>{{name}}</h1>
	<div class="cont">
		<a href="/member_list"><button>Back</button></a>
		<a href="/create_member?id={{id}}">{{edit}}</a>
		<div id="delete-button">{{delete}}</div>
	</div>
	<div>
		<h3>Attendance Stats</h3>
		<h4>Season</h4>
		{{season-ratio}} ({{season-percentage}}), Avg {{season-average}}
		<br />
		<h4>Total</h4>
		{{total-ratio}} ({{total-percentage}}), Avg {{total-average}}
	</div>
</div>
<script>
	document.getElementById("delete-button").addEventListener("click", () => {
		fetch("/api/delete_member/{{id}}", {
			method: "DELETE",
		}).then((resp) => {
			if (resp.status == 200) {
				window.location.href = "/member_list";
			} else {
				setError(resp.statusText);
			}
		});
	});
</script>
{{footer}}
