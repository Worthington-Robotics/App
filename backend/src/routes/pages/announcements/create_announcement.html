{{worbots-header}}{{error}}
<h1>Create Announcement</h1>
<form id="announce-form" class="cont col">
	<button onclick="history.back()">Back</button>
	<input type="text" name="title" id="title-field" class="announce-field" placeholder="Enter announcement title..." />
	<label for="body">Announcement Body</label>
	<textarea name="body" id="body-field" class="round border"></textarea>
	<div id="mentions">
		<h3>Mentions</h3>
		{{mentions}}
	</div>

	<input type="submit" id="submit" value="Save" />
</form>
<script>
	function onSubmit(event) {
		event.preventDefault();

		const title = encodeURIComponent(document.getElementById("title-field").value);
		const body = encodeURIComponent(document.getElementById("body-field").value);

		if (title == "") {
			setError("Title field cannot be empty");
			return;
		}

		// Iterate over checkboxes
		let mentions = [];
		for (let i = 0; ; i++) {
			const checkbox = document.getElementById(`mention-checkbox-${i}`);
			if (checkbox == null) {
				break;
			}
			if (checkbox.checked) {
				mentions.push(checkbox.name);
			}
		}
		let mentionsString = JSON.stringify(mentions);

		let requestBody = `title=${title}&body=${body}&mentioned=${mentionsString}`;

		fetch("/api/create_announcement", {
			method: "POST",
			body: requestBody,
			headers: { "Content-Type": "application/x-www-form-urlencoded" },
		}).then((response) => {
			if (response.status != 200) {
				setError("Failed to create announcement: " + response.statusText);
				return;
			}
			window.location.href = "/inbox";
		});
	}

	document.getElementById("announce-form").addEventListener("submit", onSubmit);
</script>
<style>
	.announce-field {
		width: 60%;
	}

	.announce-checkbox>input {
		margin-left: auto;
	}

	.group-mention-label {
		color: lightcoral;
	}
</style>
{{footer}}
