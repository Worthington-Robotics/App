{{worbots-header}}
<h1>Inbox</h1>
<div id="inbox" class="cont col">
	{{add}}
	<div id="announcements-cont" class="cont item-cont">{{announcements}}</div>
</div>
<style>
	#inbox {
		width: 100%;
		row-gap: 1rem;
	}

	#announcements-cont {
		flex-direction: column;
	}

	.ann {
		padding: 1.4rem;
		background-color: var(--bg2);
		flex-direction: column;
		width: 90%;
		box-sizing: border-box;
	}

	.ann-date {
		font-size: calc(1.3vw * var(--scale));
		color: var(--fg2);
		text-align: center;
	}

	.ann-title {
		font-size: calc(1.6vw * var(--scale));
		font-weight: bold;
	}

	.ann-body {
		font-size: calc(1.2vw * var(--scale));
		color: var(--fg3);
	}

	.unread {
		border: solid 0.2rem var(--wbblue);
		border-radius: 5px;
	}
</style>
{{footer}}
