{{worbots-header}}
<h1>Events</h1>
<div id="calendar" class="cont col">
	<div id="filter" class="cont">
		<button id="upcoming">Upcoming Events</button>
		<button id="all" style="background-color: var(--bg2);">All Events</button>
		{{add-event}}
	</div>
	<div id="events-cont" class="cont col item-cont">{{events}}</div>
	<br />
	<br />
	<br />
	<a href="/create_week"><button>Create Week Meetings</button></a>
</div>
<script>
	let upcomingEvents = document.getElementById("upcoming");
	let allEvents = document.getElementById("all");
	let notUpcoming = document.getElementsByClassName("not-upcoming");
	upcomingEvents.addEventListener("click", () => {
		upcomingEvents.style.backgroundColor = "";
		allEvents.style.backgroundColor = "var(--bg2)";
		for (let elem of notUpcoming) {
			elem.style.display = "none";
		}
	});
	allEvents.addEventListener("click", () => {
		allEvents.style.backgroundColor = "";
		upcomingEvents.style.backgroundColor = "var(--bg2)";
		for (let elem of notUpcoming) {
			elem.style.display = "";
		}
	});
</script>
<style>
	#calendar {
		width: 100%;
		row-gap: 1.4rem;
	}

	.ev-header {
		display: grid;
		grid-template-columns: minmax(0, 0.15fr) minmax(0, 0.6fr) minmax(0, 1.2fr);
		width: 100%;
	}

	.ev-date {
		font-size: calc(1.3vw * var(--scale));
		color: var(--fg2);
		text-align: center;
	}

	.ev-subtext {
		font-size: calc(1.2vw * var(--scale));
		color: var(--fg3);
	}

	.ev-kind,
	.ev-name {
		font-weight: bold;
	}

	.ev-name {
		text-align: center;
	}

	.ev-clock {
		width: 1rem;
		margin-right: -0.1rem;
	}
</style>
{{footer}}
