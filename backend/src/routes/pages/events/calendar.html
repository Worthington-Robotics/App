{{worbots-header}}
<h1>Events</h1>
<div id="calendar" class="cont col">
	<select name="filter" id="filter">
		<option value="upcoming">Upcoming Events</option>
		<option value="all">All Events</option>
	</select>
	<div id="events-cont" class="cont col item-cont">{{events}}</div>
	{{add-event}}
</div>
<script>
	function changeFilter(e) {
		let elems = document.getElementsByClassName("not-upcoming");
		if (e.target.value === "all") {
			for (let elem of elems) {
				elem.style.display = "flex";
			}
		} else {
			for (let elem of elems) {
				elem.style.display = "none";
			}
		}
	}

	document.getElementById("filter").addEventListener("change", changeFilter);
</script>
<style>
	#calendar {
		width: 100%;
		row-gap: 1.4rem;
	}

	.ev-date {
		font-size: calc(1.3vw * var(--scale));
		color: var(--fg2);
	}

	.ev-subtext {
		font-size: calc(1.2vw * var(--scale));
		color: var(--fg3);
	}

	.ev-kind,
	.ev-name {
		font-weight: bold;
	}
</style>
