{{worbots-header}}{{error}}{{prompt}}
<div class="cont col" id="event-details">
	<h1>{{name}}</h1>
	<h4 class="details-subtitle date">{{date}}</h4>
	<div class="cont">
		<a href="/calendar"><button>Back</button></a>
		<a href="/create_event?id={{id}}">{{edit}}</a>
		<div id="delete-button">{{delete}}</div>
	</div>
	<div class="cont">
		<div class="cont">
			<img src="/assets/icons/box.svg" class="details-icon" />
			{{kind}}
		</div>
		<div class="cont">
			<img src="/assets/icons/star.svg" class="details-icon" />
			{{urgency}}
		</div>
		<div class="cont">
			<img src="/assets/icons/eye.svg" class="details-icon" />
			{{visibility}}
		</div>
	</div>
	<div class="cont">
		<label for="rsvp">RSVP</label>
		<input type="checkbox" name="rsvp" id="rsvp" {{rsvp-checked}} />
	</div>
	{{attendance-info}}
</div>
<script>
	document.getElementById("delete-button").addEventListener("click", () => {
		showConfirmPrompt("delete this event", () => {
			fetch("/api/delete_event/{{id}}", {
				method: "DELETE",
			}).then((resp) => {
				if (resp.status == 200) {
					window.location.href = "/calendar";
				} else {
					setError(resp.statusText);
				}
			});
		});
	});
	document.getElementById("rsvp").addEventListener("change", (e) => {
		fetch(`/api/rsvp_event/{{id}}?value=${e.target.checked}`, {
			method: "POST",
		}).then((resp) => {
			if (resp.status != 200) {
				setError(resp.statusText);
			}
		});
	});
</script>
{{footer}}
